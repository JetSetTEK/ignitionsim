   <text x="100" y="73" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="18" font-weight="700" fill="#f59e0b" text-anchor="start" letter-spacing="4">BASS SHAKERS · HOW FEEL IS MADE</text>
   <text x="72" y="128" font-family="'Helvetica Neue',Arial,sans-serif" font-size="44" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="-0.5">The Tactile Signal Chain</text>
   <rect x="72" y="146" width="150" height="5" rx="2.5" fill="#f59e0b"/>
  <rect x="72" y="200" width="344.5" height="250" rx="14" ry="14" fill="#16222e" stroke="#2b3e51" stroke-width="1" opacity="1"/><circle cx="106" cy="238" r="20" fill="#f59e0b"/><text x="106" y="245" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="800" fill="#0b1118" text-anchor="middle" letter-spacing="0">1</text><text x="136" y="245" font-family="'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">1 · Sim Telemetry</text><text x="94" y="292" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">iRacing · ACC · LMU output a live</text><text x="94" y="313.44" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">stream: wheel slip, ABS pulse, RPM,</text><text x="94" y="334.88" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">suspension load, surface type.</text><path d="M420.5 311 L438.5 325 L420.5 339" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><rect x="442.5" y="200" width="344.5" height="250" rx="14" ry="14" fill="#16222e" stroke="#2b3e51" stroke-width="1" opacity="1"/><circle cx="476.5" cy="238" r="20" fill="#f59e0b"/><text x="476.5" y="245" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="800" fill="#0b1118" text-anchor="middle" letter-spacing="0">2</text><text x="506.5" y="245" font-family="'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">2 · SimHub ShakeIt</text><text x="464.5" y="292" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">Maps each channel to a discrete</text><text x="464.5" y="313.44" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">low-frequency effect, routed to a</text><text x="464.5" y="334.88" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">dedicated 2nd audio output — never</text><text x="464.5" y="356.32" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">mixed with game audio.</text><path d="M791 311 L809 325 L791 339" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><rect x="813" y="200" width="344.5" height="250" rx="14" ry="14" fill="#16222e" stroke="#2b3e51" stroke-width="1" opacity="1"/><circle cx="847" cy="238" r="20" fill="#f59e0b"/><text x="847" y="245" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="800" fill="#0b1118" text-anchor="middle" letter-spacing="0">3</text><text x="877" y="245" font-family="'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">3 · Tactile Amp</text><text x="835" y="292" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">A dedicated Class-D amp (Fosi HT4S,</text><text x="835" y="313.44" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">30W×4 + 60W×1) drives the units. A</text><text x="835" y="334.88" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">hi-fi amp or the PC jack cannot do</text><text x="835" y="356.32" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">this job.</text><path d="M1161.5 311 L1179.5 325 L1161.5 339" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><rect x="1183.5" y="200" width="344.5" height="250" rx="14" ry="14" fill="#16222e" stroke="#2b3e51" stroke-width="1" opacity="1"/><circle cx="1217.5" cy="238" r="20" fill="#f59e0b"/><text x="1217.5" y="245" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="800" fill="#0b1118" text-anchor="middle" letter-spacing="0">4</text><text x="1247.5" y="245" font-family="'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">4 · Transducer(s)</text><text x="1205.5" y="292" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">Dayton BST-1 50W under the seat ·</text><text x="1205.5" y="313.44" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">ButtKicker Gamer Plus/Pro convert</text><text x="1205.5" y="334.88" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">the amplified signal into physical</text><text x="1205.5" y="356.32" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">movement.</text><rect x="72" y="484" width="715" height="156" rx="14" ry="14" fill="#1c2b3a" stroke="#f59e0b" stroke-width="1.5" opacity="1"/><text x="96" y="526" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="19" font-weight="800" fill="#f59e0b" text-anchor="start" letter-spacing="1">SEAT TRANSDUCER FEELS</text><text x="96" y="564" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Road texture · kerb strikes · impacts · engine RPM rumble · gear-shift</text><text x="96" y="586.95" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">kick.</text><rect x="813" y="484" width="715" height="156" rx="14" ry="14" fill="#1c2b3a" stroke="#f59e0b" stroke-width="1.5" opacity="1"/><text x="837" y="526" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="19" font-weight="800" fill="#f59e0b" text-anchor="start" letter-spacing="1">PEDAL-DECK TRANSDUCER FEELS</text><text x="837" y="564" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Wheelspin · ABS pulse · brake lockup — felt directly through your feet.</text><rect x="72" y="676" width="1456" height="74" rx="14" ry="14" fill="#101b12" stroke="#34d399" stroke-width="1" opacity="1"/><text x="96" y="708" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="14" font-weight="800" fill="#34d399" text-anchor="start" letter-spacing="2">MOUNT</text><text x="190" y="706" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Isolate every bolt with dense rubber or Sorbothane so the rig informs you — instead of just rattling.</text>
