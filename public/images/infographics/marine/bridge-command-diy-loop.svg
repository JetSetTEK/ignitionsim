  <rect width="1320" height="760" rx="36" fill="url(#g)"/>
  <path d="M80 110 C300 40 520 160 750 92 S1060 42 1235 130" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="8"/>
  <text x="70" y="82" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#2dd4bf" letter-spacing="7">IGNITIONSIM FIELD CARD</text>
  <text x="70" y="128" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="#ffffff">Bridge Command DIY Loop</text>
  <rect x="70" y="170" width="1180" height="110" rx="26" fill="#ffffff" opacity="0.93"/>
<text x="110" y="224" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="#0b1118">Map the vessel</text>
<text x="110" y="266" font-family="Arial, sans-serif" font-size="22" fill="#425466">Decide helm, throttle, bow thruster, views, and alarms before hardware.</text>
<text x="1120" y="246" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#2dd4bf" text-anchor="middle">Plan</text>
<rect x="70" y="302" width="1180" height="110" rx="26" fill="#ffffff" opacity="0.93"/>
<text x="110" y="356" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="#0b1118">Use USB boards</text>
<text x="110" y="398" font-family="Arial, sans-serif" font-size="22" fill="#425466">Button interfaces and labels often beat rare marine controls.</text>
<text x="1120" y="378" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#2dd4bf" text-anchor="middle">Build</text>
<rect x="70" y="434" width="1180" height="110" rx="26" fill="#ffffff" opacity="0.93"/>
<text x="110" y="488" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="#0b1118">Test profiles</text>
<text x="110" y="530" font-family="Arial, sans-serif" font-size="22" fill="#425466">Keep backups. Marine controls are choreography, not decoration.</text>
<text x="1120" y="510" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#2dd4bf" text-anchor="middle">Save</text>
<rect x="70" y="566" width="1180" height="110" rx="26" fill="#ffffff" opacity="0.93"/>
<text x="110" y="620" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="#0b1118">Add screens slowly</text>
<text x="110" y="662" font-family="Arial, sans-serif" font-size="22" fill="#425466">Multihead is fun after the input loop is reliable.</text>
<text x="1120" y="642" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#2dd4bf" text-anchor="middle">Then</text>
