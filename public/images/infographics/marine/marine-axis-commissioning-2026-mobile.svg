    <text x="78" y="148" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="900" fill="#fff">Three positions reveal</text><text x="78" y="192.1" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="900" fill="#fff">whether the whole bridge is</text><text x="78" y="236.2" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="900" fill="#fff">trustworthy.</text>
