      <text x="66" y="588" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="900" fill="#07131b">NEUTRAL</text>
      <circle cx="326" cy="577" r="5" fill="#2dd4bf"/><text x="344" y="585" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#1d2a34">Stable dead zone</text><circle cx="326" cy="619" r="5" fill="#2dd4bf"/><text x="344" y="627" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#1d2a34">No creeping RPM</text><circle cx="326" cy="661" r="5" fill="#2dd4bf"/><text x="344" y="669" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#1d2a34">Physical detent aligns</text>
