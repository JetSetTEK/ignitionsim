<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0b1118"/><stop offset="1" stop-color="#0f1a25"/></linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.08" r="0.75"><stop offset="0" stop-color="#f59e0b" stop-opacity="0.16"/><stop offset="1" stop-color="#f59e0b" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M44 0H0V44" fill="none" stroke="#25384a" stroke-width="1" opacity="0.3"/></pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <rect x="72" y="60" width="14" height="14" fill="#f59e0b"/>
   <text x="100" y="73" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="18" font-weight="700" fill="#f59e0b" text-anchor="start" letter-spacing="4">BUY BOTTOM-TO-TOP FOR VALUE</text>
   <text x="72" y="128" font-family="'Helvetica Neue',Arial,sans-serif" font-size="44" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="-0.5">The Immersion Stack</text>
   <rect x="72" y="146" width="150" height="5" rx="2.5" fill="#f59e0b"/>
  <rect x="72" y="692" width="1456" height="150" rx="14" ry="14" fill="#16222e" stroke="#f59e0b" stroke-width="1" opacity="1"/><rect x="72" y="692" width="10" height="150" fill="#f59e0b"/><text x="102" y="732" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">Rigid seat / cockpit</text><text x="102" y="762" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">The stiff base every cue pushes against. A flexy rig turns cues to mush and makes motion unsafe.</text><text x="102" y="826" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="16" font-weight="700" fill="#f59e0b" text-anchor="start" letter-spacing="0">$200–$1,000+</text><rect x="1212" y="737" width="300" height="60" rx="12" ry="12" fill="#0b1118" stroke="#f59e0b" stroke-width="1.5" opacity="1"/><text x="1362" y="761" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="12" font-weight="700" fill="#8fa4b6" text-anchor="middle" letter-spacing="1">IMMERSION / $</text><text x="1362" y="785" font-family="'Helvetica Neue',Arial,sans-serif" font-size="19" font-weight="800" fill="#f59e0b" text-anchor="middle" letter-spacing="0">PREREQ</text><rect x="146" y="528" width="1308" height="150" rx="14" ry="14" fill="#16222e" stroke="#f59e0b" stroke-width="1" opacity="1"/><rect x="146" y="528" width="10" height="150" fill="#f59e0b"/><text x="176" y="568" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">Tactile (bass shakers)</text><text x="176" y="598" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">Wheelspin, lockup, kerb, engine rumble — the cues that actually help you drive.</text><text x="176" y="662" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="16" font-weight="700" fill="#f59e0b" text-anchor="start" letter-spacing="0">~$200–400</text><rect x="1138" y="573" width="300" height="60" rx="12" ry="12" fill="#0b1118" stroke="#34d399" stroke-width="1.5" opacity="1"/><text x="1288" y="597" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="12" font-weight="700" fill="#8fa4b6" text-anchor="middle" letter-spacing="1">IMMERSION / $</text><text x="1288" y="621" font-family="'Helvetica Neue',Arial,sans-serif" font-size="19" font-weight="800" fill="#34d399" text-anchor="middle" letter-spacing="0">HIGHEST</text><rect x="220" y="364" width="1160" height="150" rx="14" ry="14" fill="#16222e" stroke="#f59e0b" stroke-width="1" opacity="1"/><rect x="220" y="364" width="10" height="150" fill="#f59e0b"/><text x="250" y="404" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">Motion (2DOF / 3DOF)</text><text x="250" y="434" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">The big cheque and the luxury layer. Buy the axis that matters — 3DOF traction-loss over 2DOF.</text><text x="250" y="498" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="16" font-weight="700" fill="#f59e0b" text-anchor="start" letter-spacing="0">~$2,999+</text><rect x="1064" y="409" width="300" height="60" rx="12" ry="12" fill="#0b1118" stroke="#f87171" stroke-width="1.5" opacity="1"/><text x="1214" y="433" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="12" font-weight="700" fill="#8fa4b6" text-anchor="middle" letter-spacing="1">IMMERSION / $</text><text x="1214" y="457" font-family="'Helvetica Neue',Arial,sans-serif" font-size="19" font-weight="800" fill="#f87171" text-anchor="middle" letter-spacing="0">LOW</text><rect x="294" y="200" width="1012" height="150" rx="14" ry="14" fill="#16222e" stroke="#f59e0b" stroke-width="1" opacity="1"/><rect x="294" y="200" width="10" height="150" fill="#f59e0b"/><text x="324" y="240" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">Wind sim</text><text x="324" y="270" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">Speed-reactive fans via SimHub. Air builds as speed climbs — pick a quiet</text><text x="324" y="290.16" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">fan for apartments.</text><text x="324" y="334" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="16" font-weight="700" fill="#f59e0b" text-anchor="start" letter-spacing="0">~$120–250</text><rect x="990" y="245" width="300" height="60" rx="12" ry="12" fill="#0b1118" stroke="#8bc34a" stroke-width="1.5" opacity="1"/><text x="1140" y="269" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="12" font-weight="700" fill="#8fa4b6" text-anchor="middle" letter-spacing="1">IMMERSION / $</text><text x="1140" y="293" font-family="'Helvetica Neue',Arial,sans-serif" font-size="19" font-weight="800" fill="#8bc34a" text-anchor="middle" letter-spacing="0">HIGH</text><rect x="72" y="852" width="1456" height="52" rx="14" ry="14" fill="#1a1206" stroke="#f59e0b" stroke-width="1" opacity="1"/><text x="94" y="884" font-size="18" fill="#f59e0b" font-family="'Helvetica Neue',Arial,sans-serif">★</text><text x="122" y="880" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Buy bottom-to-top. Skipping tactile to buy motion is buying the roof before the walls. Neither motion nor wind makes you faster — they buy immersion.</text>
  <line x1="72" y1="914" x2="1528" y2="914" stroke="#2b3e51" stroke-width="1" opacity="0.6"/>
   <text x="72" y="960" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="16" font-weight="700" fill="#8fa4b6" text-anchor="start" letter-spacing="3">IGNITIONSIM.COM</text>
   <rect x="1418" y="938" width="110" height="34" rx="17" fill="#f59e0b" opacity="0.16"/>
   <text x="1473" y="960" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="700" fill="#f59e0b" text-anchor="middle" letter-spacing="2">RACING</text>
</svg>