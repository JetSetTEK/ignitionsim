<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0b1118"/><stop offset="1" stop-color="#0f1a25"/></linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.08" r="0.75"><stop offset="0" stop-color="#f59e0b" stop-opacity="0.16"/><stop offset="1" stop-color="#f59e0b" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M44 0H0V44" fill="none" stroke="#25384a" stroke-width="1" opacity="0.3"/></pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <rect x="72" y="60" width="14" height="14" fill="#f59e0b"/>
   <text x="100" y="73" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="18" font-weight="700" fill="#f59e0b" text-anchor="start" letter-spacing="4">HOW MUCH OF THE CORNER YOU SEE</text>
   <text x="72" y="128" font-family="'Helvetica Neue',Arial,sans-serif" font-size="44" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="-0.5">Triple vs Ultrawide FOV</text>
   <rect x="72" y="146" width="150" height="5" rx="2.5" fill="#f59e0b"/>
  <path d="M430 720 L249.8 431.7 A 340 340 0 0 1 610.2 431.7 Z" fill="#f59e0b" opacity="0.10" stroke="#f59e0b" stroke-opacity="0.35"/><line x1="249.8" y1="431.7" x2="610.2" y2="431.7" stroke="#f59e0b" stroke-width="10" stroke-linecap="round"/><circle cx="430" cy="720" r="15" fill="#eef5fb"/><path d="M421 717 a9 9 0 0 1 18 0" fill="none" stroke="#eef5fb" stroke-width="3"/><text x="430" y="770" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="13" font-weight="700" fill="#8fa4b6" text-anchor="middle" letter-spacing="2">DRIVER</text><text x="430" y="340" font-family="'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="800" fill="#eef5fb" text-anchor="middle" letter-spacing="0">SINGLE ULTRAWIDE</text><text x="430" y="365" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="600" fill="#f59e0b" text-anchor="middle" letter-spacing="0">49" / 57" · 32:9</text><text x="430" y="812" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="800" fill="#f59e0b" text-anchor="middle" letter-spacing="0">~55–65° FOV</text><path d="M1150 720 L811.3 749.6 A 340 340 0 1 1 1488.7 749.6 Z" fill="#f59e0b" opacity="0.10" stroke="#f59e0b" stroke-opacity="0.35"/><line x1="811.3" y1="749.6" x2="909.6" y2="479.6" stroke="#f59e0b" stroke-width="10" stroke-linecap="round"/><line x1="1006.3" y1="411.9" x2="1293.7" y2="411.9" stroke="#f59e0b" stroke-width="10" stroke-linecap="round"/><line x1="1390.4" y1="479.6" x2="1488.7" y2="749.6" stroke="#f59e0b" stroke-width="10" stroke-linecap="round"/><circle cx="1150" cy="720" r="15" fill="#eef5fb"/><path d="M1141 717 a9 9 0 0 1 18 0" fill="none" stroke="#eef5fb" stroke-width="3"/><text x="1150" y="770" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="13" font-weight="700" fill="#8fa4b6" text-anchor="middle" letter-spacing="2">DRIVER</text><text x="1150" y="340" font-family="'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="800" fill="#eef5fb" text-anchor="middle" letter-spacing="0">TRIPLE 27" ANGLED</text><text x="1150" y="365" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="600" fill="#f59e0b" text-anchor="middle" letter-spacing="0">~55–60° toe-in</text><text x="1150" y="812" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="800" fill="#f59e0b" text-anchor="middle" letter-spacing="0">~180–195° FOV</text><line x1="800" y1="240" x2="800" y2="796" stroke="#2b3e51" stroke-width="1" stroke-dasharray="6 8" opacity="0.5"/><rect x="72" y="832" width="1456" height="74" rx="14" ry="14" fill="#16222e" stroke="#2b3e51" stroke-width="1" opacity="1"/><text x="96" y="860" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16.5" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">The ultrawide shows a WIDER single image; the triple shows you the SIDE of the track — mirrors, apex, the car alongside — that an ultrawide crops off. Triples</text><text x="96" y="881.12" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16.5" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">need in-sim triple-projection / bezel correction so the angled side views render at the correct perspective.</text>
  <line x1="72" y1="914" x2="1528" y2="914" stroke="#2b3e51" stroke-width="1" opacity="0.6"/>
   <text x="72" y="960" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="16" font-weight="700" fill="#8fa4b6" text-anchor="start" letter-spacing="3">IGNITIONSIM.COM</text>
   <rect x="1418" y="938" width="110" height="34" rx="17" fill="#f59e0b" opacity="0.16"/>
   <text x="1473" y="960" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="700" fill="#f59e0b" text-anchor="middle" letter-spacing="2">RACING</text>
</svg>