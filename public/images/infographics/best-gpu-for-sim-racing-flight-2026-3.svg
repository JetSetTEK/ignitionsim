<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0b1118"/><stop offset="1" stop-color="#0f1a25"/></linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.08" r="0.75"><stop offset="0" stop-color="#38bdf8" stop-opacity="0.16"/><stop offset="1" stop-color="#38bdf8" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M44 0H0V44" fill="none" stroke="#25384a" stroke-width="1" opacity="0.3"/></pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <rect x="72" y="60" width="14" height="14" fill="#38bdf8"/>
   <text x="100" y="73" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="18" font-weight="700" fill="#38bdf8" text-anchor="start" letter-spacing="4">SWEET SPOT VS ZERO-COMPROMISE</text>
   <text x="72" y="128" font-family="'Helvetica Neue',Arial,sans-serif" font-size="44" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="-0.5">RTX 5080 vs 5090 for Sim</text>
   <rect x="72" y="146" width="150" height="5" rx="2.5" fill="#38bdf8"/>
  <rect x="72" y="195" width="1456" height="81.52000000000001" rx="14" ry="14" fill="#1c2b3a" stroke="#38bdf8" stroke-width="1.5" opacity="1"/><rect x="72" y="195" width="8" height="81.52000000000001" fill="#38bdf8"/><text x="102" y="225" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="14" font-weight="800" fill="#38bdf8" text-anchor="start" letter-spacing="2">WHY MSFS 2024 IS THE BENCHMARK</text><text x="102" y="253" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">MSFS 2024 is CPU AND GPU brutal — it streams real-world scenery, photogrammetry cities, dense autogen and weather. A fast CPU (X3D) feeds frames;</text><text x="102" y="276.4" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">the GPU renders them.</text><rect x="72" y="296.52" width="716" height="402" rx="14" ry="14" fill="#16222e" stroke="#2b3e51" stroke-width="1" opacity="1"/><path d="M72 310.52 q0 -14 14 -14 h688 q14 0 14 14 v50 h-716 z" fill="#0b1118"/><text x="96" y="338.52" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">RTX 5080 — the sweet spot</text><circle cx="98" cy="398.52" r="3.5" fill="#38bdf8"/><text x="114" y="403.52" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17.5" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">16GB GDDR7 · 10,752 CUDA cores</text><circle cx="98" cy="435.27" r="3.5" fill="#38bdf8"/><text x="114" y="440.27" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17.5" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">256-bit bus · ~$999 MSRP (street ~$1,249+)</text><circle cx="98" cy="472.02" r="3.5" fill="#38bdf8"/><text x="114" y="477.02" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17.5" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Holds 1440p, ultrawide and triple-1440p</text><circle cx="98" cy="508.77" r="3.5" fill="#38bdf8"/><text x="114" y="513.77" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17.5" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Clears 4K with DLSS frame-generation</text><rect x="88" y="602.52" width="684" height="80" rx="14" ry="14" fill="#0b1118" stroke="#38bdf8" stroke-width="1" opacity="1"/><text x="102" y="628.52" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="13" font-weight="800" fill="#38bdf8" text-anchor="start" letter-spacing="2">PICK IT IF</text><text x="102" y="650.52" font-family="'Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">1440p · ultrawide · triples · 4K-with-frame-gen · Quest 3 / Beyond 2 VR · you</text><text x="102" y="669.12" font-family="'Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">value your money</text><rect x="812" y="296.52" width="716" height="402" rx="14" ry="14" fill="#16222e" stroke="#38bdf8" stroke-width="2" opacity="1"/><path d="M812 310.52 q0 -14 14 -14 h688 q14 0 14 14 v50 h-716 z" fill="#38bdf8"/><text x="836" y="338.52" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="800" fill="#0b1118" text-anchor="start" letter-spacing="0">RTX 5090 — zero compromise</text><circle cx="838" cy="398.52" r="3.5" fill="#38bdf8"/><text x="854" y="403.52" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17.5" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">32GB GDDR7 · 21,760 CUDA cores</text><circle cx="838" cy="435.27" r="3.5" fill="#38bdf8"/><text x="854" y="440.27" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17.5" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">512-bit bus · ~$1,999 MSRP (street ~$2,699+)</text><circle cx="838" cy="472.02" r="3.5" fill="#38bdf8"/><text x="854" y="477.02" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17.5" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">The only card that clears native 4K Ultra</text><circle cx="838" cy="508.77" r="3.5" fill="#38bdf8"/><text x="854" y="513.77" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17.5" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Handles high-res VR (Crystal Super) without compromise</text><rect x="828" y="602.52" width="684" height="80" rx="14" ry="14" fill="#0b1118" stroke="#38bdf8" stroke-width="1" opacity="1"/><text x="842" y="628.52" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="13" font-weight="800" fill="#38bdf8" text-anchor="start" letter-spacing="2">PICK IT IF</text><text x="842" y="650.52" font-family="'Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">native 4K Ultra · Pimax Crystal Super · triples + VR · headroom &amp; stock permitting</text><rect x="72" y="714.52" width="1456" height="54" rx="14" ry="14" fill="#101b12" stroke="#34d399" stroke-width="1.5" opacity="1"/><text x="96" y="748.52" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="14" font-weight="800" fill="#34d399" text-anchor="start" letter-spacing="2">VERDICT</text><text x="222" y="747.52" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="700" fill="#eef5fb" text-anchor="start" letter-spacing="0">Clears 60fps 4K Ultra in MSFS 2024 = 5090 (native) or 5080 (with DLSS frame-gen).</text><text x="78" y="800.52" font-family="'Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">Frame generation (DLSS 4) is the lever that lets a 5080 punch into 4K — it adds a little latency; fine for flight, weigh it for competitive racing.</text>
  <line x1="72" y1="914" x2="1528" y2="914" stroke="#2b3e51" stroke-width="1" opacity="0.6"/>
   <text x="72" y="960" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="16" font-weight="700" fill="#8fa4b6" text-anchor="start" letter-spacing="3">IGNITIONSIM.COM</text>
   <rect x="1418" y="938" width="110" height="34" rx="17" fill="#38bdf8" opacity="0.16"/>
   <text x="1473" y="960" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="700" fill="#38bdf8" text-anchor="middle" letter-spacing="2">FLIGHT</text>
</svg>