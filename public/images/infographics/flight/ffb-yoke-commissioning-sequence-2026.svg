      <text x="101" y="348" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800" fill="#0b1720">1 · MOUNT</text>
      <circle cx="107" cy="411" r="6" fill="#20b8d8"/><text x="127" y="420" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="650" fill="#1d2a34">Bolt or clamp the base</text><circle cx="107" cy="466" r="6" fill="#20b8d8"/><text x="127" y="475" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="650" fill="#1d2a34">Check pitch clearance</text><circle cx="107" cy="521" r="6" fill="#20b8d8"/><text x="127" y="530" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="650" fill="#1d2a34">Route power + data</text><circle cx="107" cy="576" r="6" fill="#20b8d8"/><text x="127" y="585" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="650" fill="#1d2a34">Keep the stop switch</text><text x="127" y="612.84" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="650" fill="#1d2a34">reachable</text>
    </g><g>
      <rect x="495" y="300" width="390" height="350" rx="18" fill="#ffffff" fill-opacity="0.96" stroke="#20b8d8" stroke-width="4"/>
