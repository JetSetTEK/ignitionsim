    <text x="115" y="94" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#20b8d8">THE FIRST EVENING</text>
    <text x="115" y="154" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="800" fill="#f5f7f6">One aircraft. One neutral profile. Then add</text><text x="115" y="203.92000000000002" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="800" fill="#f5f7f6">feel.</text>
