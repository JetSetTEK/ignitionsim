<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#08131f"/>
      <stop offset="0.55" stop-color="#182332"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <rect width="1320" height="760" rx="36" fill="url(#g)"/>
  <path d="M80 110 C300 40 520 160 750 92 S1060 42 1235 130" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="8"/>
  <text x="70" y="82" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#38bdf8" letter-spacing="7">IGNITIONSIM FIELD CARD</text>
  <text x="70" y="128" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="#ffffff">MSFS Control Order</text>
  <rect x="70" y="170" width="1180" height="110" rx="26" fill="#ffffff" opacity="0.93"/>
<text x="110" y="224" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="#0b1118">Primary control</text>
<text x="110" y="266" font-family="Arial, sans-serif" font-size="22" fill="#425466">Yoke or stick must feel natural before panels matter.</text>
<text x="1120" y="246" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#38bdf8" text-anchor="middle">1</text>
<rect x="70" y="302" width="1180" height="110" rx="26" fill="#ffffff" opacity="0.93"/>
<text x="110" y="356" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="#0b1118">Throttle and rudders</text>
<text x="110" y="398" font-family="Arial, sans-serif" font-size="22" fill="#425466">The landing loop needs hands and feet before extra screens.</text>
<text x="1120" y="378" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#38bdf8" text-anchor="middle">2</text>
<rect x="70" y="434" width="1180" height="110" rx="26" fill="#ffffff" opacity="0.93"/>
<text x="110" y="488" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="#0b1118">USB and mounting</text>
<text x="110" y="530" font-family="Arial, sans-serif" font-size="22" fill="#425466">Powered hubs and stable clamps save more nights than another dial.</text>
<text x="1120" y="510" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#38bdf8" text-anchor="middle">3</text>
<rect x="70" y="566" width="1180" height="110" rx="26" fill="#ffffff" opacity="0.93"/>
<text x="110" y="620" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="#0b1118">Panels, VR, scenery</text>
<text x="110" y="662" font-family="Arial, sans-serif" font-size="22" fill="#425466">Add the candy after the cockpit stops disconnecting.</text>
<text x="1120" y="642" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#38bdf8" text-anchor="middle">4</text>
</svg>