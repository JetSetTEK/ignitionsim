<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0b1118"/><stop offset="1" stop-color="#0f1a25"/></linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.08" r="0.75"><stop offset="0" stop-color="#f59e0b" stop-opacity="0.16"/><stop offset="1" stop-color="#f59e0b" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M44 0H0V44" fill="none" stroke="#25384a" stroke-width="1" opacity="0.3"/></pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <rect x="72" y="60" width="14" height="14" fill="#f59e0b"/>
   <text x="100" y="73" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="18" font-weight="700" fill="#f59e0b" text-anchor="start" letter-spacing="4">COMPONENT BUILD VS PLUG-AND-PLAY</text>
   <text x="72" y="128" font-family="'Helvetica Neue',Arial,sans-serif" font-size="44" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="-0.5">Two Routes Into Tactile</text>
   <rect x="72" y="146" width="150" height="5" rx="2.5" fill="#f59e0b"/>
  <rect x="336" y="192" width="589" height="82" rx="14" ry="14" fill="#1c2b3a" stroke="#f59e0b" stroke-width="1.5" opacity="1"/><text x="630.5" y="226" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="800" fill="#eef5fb" text-anchor="middle" letter-spacing="0">DIY: transducer + amp</text><text x="630.5" y="254" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="600" fill="#f59e0b" text-anchor="middle" letter-spacing="1">~$200–260 · full control</text><rect x="939" y="192" width="589" height="82" rx="14" ry="14" fill="#1c2b3a" stroke="#f59e0b" stroke-width="1.5" opacity="1"/><text x="1233.5" y="226" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="800" fill="#eef5fb" text-anchor="middle" letter-spacing="0">All-in-one pad (NLR HF8)</text><text x="1233.5" y="254" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="600" fill="#f59e0b" text-anchor="middle" letter-spacing="1">~$179–199 · plug &amp; play</text><rect x="72" y="288" width="250" height="58" rx="14" ry="14" fill="#16222e" stroke="none" stroke-width="1" opacity="1"/><text x="90" y="323" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">Cost</text><rect x="336" y="288" width="589" height="58" rx="14" ry="14" fill="#16222e" stroke="none" stroke-width="0" opacity="1"/><text x="356" y="316" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">Dayton BST-1 ~$55 ea + Fosi HT4S ~$145 + SimHub (free)</text><rect x="939" y="288" width="589" height="58" rx="14" ry="14" fill="#16222e" stroke="none" stroke-width="0" opacity="1"/><text x="959" y="316" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">One purchase, ~$179–199, no amp to source</text><rect x="72" y="354" width="250" height="70.88" rx="14" ry="14" fill="#0f1822" stroke="none" stroke-width="1" opacity="1"/><text x="90" y="395.44" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">Effort</text><rect x="336" y="354" width="589" height="70.88" rx="14" ry="14" fill="#0f1822" stroke="none" stroke-width="0" opacity="1"/><text x="356" y="382" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">HIGH — wire the amp, match impedance, set a 2nd audio out,</text><text x="356" y="404.1" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">tune ShakeIt</text><rect x="939" y="354" width="589" height="70.88" rx="14" ry="14" fill="#0f1822" stroke="#f59e0b" stroke-width="2" opacity="1"/><text x="959" y="382" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">LOW — USB in, sits on the seat, no wiring or impedance math</text><text x="1514" y="384" font-family="'Helvetica Neue',Arial,sans-serif" font-size="19" font-weight="800" fill="#f59e0b" text-anchor="end" letter-spacing="0">✓</text><rect x="72" y="432.88" width="250" height="70.88" rx="14" ry="14" fill="#16222e" stroke="none" stroke-width="1" opacity="1"/><text x="90" y="474.32" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">Effect</text><rect x="336" y="432.88" width="589" height="70.88" rx="14" ry="14" fill="#16222e" stroke="#f59e0b" stroke-width="2" opacity="1"/><text x="356" y="460.88" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Strongest, most separable slam; scales to 4+ units + pedal</text><text x="356" y="482.98" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">deck</text><text x="911" y="462.88" font-family="'Helvetica Neue',Arial,sans-serif" font-size="19" font-weight="800" fill="#f59e0b" text-anchor="end" letter-spacing="0">✓</text><rect x="939" y="432.88" width="589" height="70.88" rx="14" ry="14" fill="#16222e" stroke="none" stroke-width="0" opacity="1"/><text x="959" y="460.88" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">8 motors give position (F/R/L/R) but less raw low-end slam</text><rect x="72" y="511.76" width="250" height="58" rx="14" ry="14" fill="#0f1822" stroke="none" stroke-width="1" opacity="1"/><text x="90" y="546.76" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">Noise</text><rect x="336" y="511.76" width="589" height="58" rx="14" ry="14" fill="#0f1822" stroke="none" stroke-width="0" opacity="1"/><text x="356" y="539.76" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">Bolted transducers transmit into the room and floor</text><rect x="939" y="511.76" width="589" height="58" rx="14" ry="14" fill="#0f1822" stroke="#f59e0b" stroke-width="2" opacity="1"/><text x="959" y="539.76" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Quiet enough for apartments</text><text x="1514" y="541.76" font-family="'Helvetica Neue',Arial,sans-serif" font-size="19" font-weight="800" fill="#f59e0b" text-anchor="end" letter-spacing="0">✓</text><rect x="72" y="577.76" width="250" height="58" rx="14" ry="14" fill="#16222e" stroke="none" stroke-width="1" opacity="1"/><text x="90" y="612.76" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">Best for</text><rect x="336" y="577.76" width="589" height="58" rx="14" ry="14" fill="#16222e" stroke="none" stroke-width="0" opacity="1"/><text x="356" y="605.76" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">The tinkerer chasing maximum feel-per-dollar</text><rect x="939" y="577.76" width="589" height="58" rx="14" ry="14" fill="#16222e" stroke="none" stroke-width="0" opacity="1"/><text x="959" y="605.76" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">Apartment racers who want tactile working in 10 minutes</text><rect x="72" y="645.76" width="1456" height="70.88" rx="14" ry="14" fill="#101b12" stroke="#34d399" stroke-width="1" opacity="1"/><text x="94" y="677.76" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="14" font-weight="800" fill="#34d399" text-anchor="start" letter-spacing="2">RULE</text><text x="192" y="673.76" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Both routes run on SimHub telemetry. The ButtKicker Gamer Plus/Pro (~$280 / ~$380) is the bundled middle path — transducer + matched 90W/150W</text><text x="192" y="695.52" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">amp in one box.</text>
