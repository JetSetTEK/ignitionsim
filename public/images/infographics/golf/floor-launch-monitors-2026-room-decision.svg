<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">2026 floor launch monitor decision map</title>
  <desc id="desc">A decision tree that recommends Square Omni, GolfJoy Spica 3, OpenLaunch Nova, or Uneekor Eye Mini Core based on outdoor use, club data, open software, and subscription tolerance.</desc>
  <rect width="1600" height="900" fill="#f4f8f3"/>
  <rect x="46" y="42" width="1508" height="816" rx="34" fill="#ffffff" stroke="#17352f" stroke-width="4"/>
  <text x="100" y="128" fill="#17352f" font-family="Arial, sans-serif" font-size="54" font-weight="800">YOUR ROOM PICKS THE SENSOR</text>
  <text x="100" y="176" fill="#56706a" font-family="Arial, sans-serif" font-size="27">Four current floor units. Four different ownership bargains.</text>

  <rect x="100" y="226" width="1400" height="112" rx="22" fill="#17352f"/>
  <text x="800" y="276" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="32" font-weight="700">WILL DIRECT-SUN OUTDOOR USE BE A WEEKLY JOB?</text>
  <text x="800" y="316" text-anchor="middle" fill="#bde5d0" font-family="Arial, sans-serif" font-size="24">If yes, demand a return window and test your actual range before committing.</text>

  <path d="M800 338V398 M800 398H350 M800 398H1250" fill="none" stroke="#17352f" stroke-width="6"/>
  <circle cx="350" cy="398" r="12" fill="#ef6a3a"/>
  <circle cx="1250" cy="398" r="12" fill="#ef6a3a"/>

  <rect x="100" y="432" width="500" height="330" rx="26" fill="#e8f6ee" stroke="#3b876b" stroke-width="3"/>
  <text x="142" y="490" fill="#2f765c" font-family="Arial, sans-serif" font-size="24" font-weight="800">CLUB DELIVERY MATTERS</text>
  <text x="142" y="548" fill="#17352f" font-family="Arial, sans-serif" font-size="38" font-weight="800">GOLFJOY SPICA 3</text>
  <text x="142" y="596" fill="#17352f" font-family="Arial, sans-serif" font-size="25">Three cameras, battery, screen,</text>
  <text x="142" y="632" fill="#17352f" font-family="Arial, sans-serif" font-size="25">and four core club metrics.</text>
  <text x="142" y="684" fill="#a2482a" font-family="Arial, sans-serif" font-size="23" font-weight="700">CAVEAT: club stickers + $3,199</text>
  <text x="142" y="724" fill="#56706a" font-family="Arial, sans-serif" font-size="21">Best fit for serious indoor/outdoor practice.</text>

  <rect x="650" y="432" width="400" height="330" rx="26" fill="#fff1e8" stroke="#ef6a3a" stroke-width="3"/>
  <text x="692" y="490" fill="#b34924" font-family="Arial, sans-serif" font-size="24" font-weight="800">NO ANNUAL HARDWARE FEE</text>
  <text x="692" y="548" fill="#17352f" font-family="Arial, sans-serif" font-size="38" font-weight="800">SQUARE OMNI</text>
  <text x="692" y="596" fill="#17352f" font-family="Arial, sans-serif" font-size="25">Built-in screen, battery,</text>
  <text x="692" y="632" fill="#17352f" font-family="Arial, sans-serif" font-size="25">and 20+ marketed metrics.</text>
  <text x="692" y="684" fill="#a2482a" font-family="Arial, sans-serif" font-size="23" font-weight="700">CAVEAT: direct sunlight</text>
  <text x="692" y="724" fill="#56706a" font-family="Arial, sans-serif" font-size="21">Best fit for indoor-first value buyers.</text>

  <rect x="1100" y="432" width="400" height="330" rx="26" fill="#edf3ff" stroke="#4177ba" stroke-width="3"/>
  <text x="1142" y="490" fill="#37689e" font-family="Arial, sans-serif" font-size="24" font-weight="800">SOFTWARE DECIDES</text>
  <text x="1142" y="548" fill="#17352f" font-family="Arial, sans-serif" font-size="32" font-weight="800">OPENLAUNCH NOVA</text>
  <text x="1142" y="592" fill="#56706a" font-family="Arial, sans-serif" font-size="20">Open data + GSPro workflows</text>
  <line x1="1142" y1="622" x2="1458" y2="622" stroke="#b8c8dd" stroke-width="2"/>
  <text x="1142" y="664" fill="#17352f" font-family="Arial, sans-serif" font-size="32" font-weight="800">EYE MINI CORE</text>
  <text x="1142" y="706" fill="#56706a" font-family="Arial, sans-serif" font-size="20">Known ball-data stack + Amazon</text>
  <text x="1142" y="744" fill="#a2482a" font-family="Arial, sans-serif" font-size="20" font-weight="700">Pick openness or support history.</text>

  <text x="100" y="820" fill="#56706a" font-family="Arial, sans-serif" font-size="20">IGNITIONSIM LAB NOTE · Verify current stock, software tiers, and return terms before checkout.</text>
</svg>
