<svg xmlns="http://www.w3.org/2000/svg" width="900" height="2460" viewBox="0 0 900 2460" role="img" aria-labelledby="title desc">
  <title id="title">Mobile 2026 golf simulator software decision map</title>
  <desc id="desc">A mobile-readable comparison of GSPro, E6 2026, Awesome Golf, and FSX Play.</desc>
  <defs>
    <linearGradient id="mbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081d23"/>
      <stop offset=".55" stop-color="#123c3a"/>
      <stop offset="1" stop-color="#162238"/>
    </linearGradient>
  </defs>
  <rect width="900" height="2460" rx="42" fill="url(#mbg)"/>
  <text x="58" y="78" fill="#8df7dd" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="800">IGNITIONSIM · VERIFIED JULY 24, 2026</text>
  <text x="58" y="140" fill="#ffffff" font-family="Inter,Arial,sans-serif" font-size="45" font-weight="900">Pick software for the room</text>
  <text x="58" y="192" fill="#ffffff" font-family="Inter,Arial,sans-serif" font-size="45" font-weight="900">you will actually use.</text>
  <text x="58" y="244" fill="#c5d5d8" font-family="Inter,Arial,sans-serif" font-size="24">League, practice, family night, or Foresight:</text>
  <text x="58" y="280" fill="#c5d5d8" font-family="Inter,Arial,sans-serif" font-size="24">the job changes the winner.</text>

  <g font-family="Inter,Arial,sans-serif">
    <rect x="46" y="338" width="808" height="438" rx="30" fill="#f8fbfa"/>
    <rect x="46" y="338" width="808" height="18" rx="9" fill="#23caa0"/>
    <text x="88" y="414" fill="#0c342d" font-size="24" font-weight="800">COMMUNITY + LEAGUES</text>
    <text x="88" y="480" fill="#071c1b" font-size="52" font-weight="900">GSPro</text>
    <text x="88" y="532" fill="#40565a" font-size="26">Best overall for a serious Windows home bay.</text>
    <text x="88" y="596" fill="#0c342d" font-size="25" font-weight="800">$250 / YEAR · WINDOWS 10/11</text>
    <text x="88" y="640" fill="#40565a" font-size="23">GTX 3060 + 16 GB floor · 2,500+ community courses</text>
    <rect x="76" y="682" width="748" height="64" rx="16" fill="#dff8f0"/>
    <text x="98" y="724" fill="#0c342d" font-size="21" font-weight="800">WATCH: some monitors require another paid plan.</text>

    <rect x="46" y="814" width="808" height="438" rx="30" fill="#fff9ed"/>
    <rect x="46" y="814" width="808" height="18" rx="9" fill="#ffb22c"/>
    <text x="88" y="890" fill="#573711" font-size="24" font-weight="800">PRACTICE + FITTING</text>
    <text x="88" y="956" fill="#2d1d0b" font-size="52" font-weight="900">E6 2026</text>
    <text x="88" y="1008" fill="#645443" font-size="26">Best for bag mapping, fitting, and structured work.</text>
    <text x="88" y="1072" fill="#573711" font-size="25" font-weight="800">$150 IMPROVE · $300 PLAY · $450 ENJOY</text>
    <text x="88" y="1116" fill="#645443" font-size="23">Windows · RTX 3060 12 GB · 24 GB RAM · 15,000+ courses</text>
    <rect x="76" y="1158" width="748" height="64" rx="16" fill="#fff0c8"/>
    <text x="98" y="1200" fill="#573711" font-size="21" font-weight="800">WATCH: E6 Connect is the previous generation.</text>

    <rect x="46" y="1290" width="808" height="438" rx="30" fill="#f3f0ff"/>
    <rect x="46" y="1290" width="808" height="18" rx="9" fill="#8c62e8"/>
    <text x="88" y="1366" fill="#382765" font-size="24" font-weight="800">FAMILY + PORTABILITY</text>
    <text x="88" y="1432" fill="#221541" font-size="52" font-weight="900">Awesome Golf</text>
    <text x="88" y="1484" fill="#554d66" font-size="26">Best for quick games, kids, guests, and mixed skills.</text>
    <text x="88" y="1548" fill="#382765" font-size="25" font-weight="800">$14.99 / MO · $159.99 / YR · $349.99 LIFE</text>
    <text x="88" y="1592" fill="#554d66" font-size="23">Windows · Mac · ChromeOS · iOS · Android</text>
    <rect x="76" y="1634" width="748" height="64" rx="16" fill="#e7dfff"/>
    <text x="98" y="1676" fill="#382765" font-size="21" font-weight="800">WATCH: buy the social ease, not photorealism.</text>

    <rect x="46" y="1766" width="808" height="438" rx="30" fill="#f1f7ff"/>
    <rect x="46" y="1766" width="808" height="18" rx="9" fill="#3c8deb"/>
    <text x="88" y="1842" fill="#163e6c" font-size="24" font-weight="800">FORESIGHT + BUSHNELL OWNERS</text>
    <text x="88" y="1908" fill="#0c2948" font-size="52" font-weight="900">FSX Play</text>
    <text x="88" y="1960" fill="#465c74" font-size="26">Best native route when the sensor chose the lane.</text>
    <text x="88" y="2024" fill="#163e6c" font-size="25" font-weight="800">LICENSE VARIES BY HARDWARE AND PLAN</text>
    <text x="88" y="2068" fill="#465c74" font-size="23">Windows + NVIDIA recommended · purchased courses separate</text>
    <rect x="76" y="2110" width="748" height="64" rx="16" fill="#dcecff"/>
    <text x="98" y="2152" fill="#163e6c" font-size="21" font-weight="800">WATCH: Launch Pro / GC3S may require active Gold.</text>
  </g>

  <text x="58" y="2280" fill="#ffffff" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="850">Nina's order:</text>
  <text x="58" y="2322" fill="#ffffff" font-family="Inter,Arial,sans-serif" font-size="27" font-weight="850">software → exact monitor → room → PC → projector.</text>
  <text x="58" y="2385" fill="#a9c3c5" font-family="Inter,Arial,sans-serif" font-size="20">Terms change. Verify again before purchase.</text>
  <text x="710" y="2385" fill="#ffbb75" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800">IGNITIONSIM</text>
</svg>
