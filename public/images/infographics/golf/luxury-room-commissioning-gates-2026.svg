<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Luxury golf simulator room commissioning gates</title>
  <desc id="desc">Five gates for planning, rough-in, installation, commissioning and owner handoff of a premium golf simulator room.</desc>
  <rect width="1600" height="900" fill="#10261f"/>
  <text x="90" y="100" fill="#66d6a8" font-family="Arial, sans-serif" font-size="28" font-weight="700">IGNITIONSIM // ROOM COMMISSIONING</text>
  <text x="90" y="180" fill="#ffffff" font-family="Arial, sans-serif" font-size="58" font-weight="800">Five gates between expensive and luxurious.</text>
  <g font-family="Arial, sans-serif">
    <g transform="translate(80 300)"><rect width="270" height="330" rx="14" fill="#f5f0e7"/><text x="28" y="60" fill="#e85c3a" font-size="24" font-weight="700">GATE 1</text><text x="28" y="112" fill="#152820" font-size="34" font-weight="800">ROOM BRIEF</text><text x="28" y="165" fill="#4d655b" font-size="21">Swing envelope</text><text x="28" y="200" fill="#4d655b" font-size="21">Screen + aspect</text><text x="28" y="235" fill="#4d655b" font-size="21">Sensor geometry</text><text x="28" y="270" fill="#4d655b" font-size="21">Projector throw</text></g>
    <g transform="translate(375 300)"><rect width="270" height="330" rx="14" fill="#f5f0e7"/><text x="28" y="60" fill="#e85c3a" font-size="24" font-weight="700">GATE 2</text><text x="28" y="112" fill="#152820" font-size="34" font-weight="800">ROUGH-IN</text><text x="28" y="165" fill="#4d655b" font-size="21">Power + data</text><text x="28" y="200" fill="#4d655b" font-size="21">Spare conduit</text><text x="28" y="235" fill="#4d655b" font-size="21">HVAC + lighting</text><text x="28" y="270" fill="#4d655b" font-size="21">Service access</text></g>
    <g transform="translate(670 300)"><rect width="270" height="330" rx="14" fill="#f5f0e7"/><text x="28" y="60" fill="#e85c3a" font-size="24" font-weight="700">GATE 3</text><text x="28" y="112" fill="#152820" font-size="34" font-weight="800">INSTALL</text><text x="28" y="165" fill="#4d655b" font-size="21">Screen tension</text><text x="28" y="200" fill="#4d655b" font-size="21">Mount alignment</text><text x="28" y="235" fill="#4d655b" font-size="21">Protected edges</text><text x="28" y="270" fill="#4d655b" font-size="21">Replaceable mat</text></g>
    <g transform="translate(965 300)"><rect width="270" height="330" rx="14" fill="#f5f0e7"/><text x="28" y="60" fill="#e85c3a" font-size="24" font-weight="700">GATE 4</text><text x="28" y="112" fill="#152820" font-size="34" font-weight="800">PROVE IT</text><text x="28" y="165" fill="#4d655b" font-size="21">Both handednesses</text><text x="28" y="200" fill="#4d655b" font-size="21">Driver to putter</text><text x="28" y="235" fill="#4d655b" font-size="21">Full-round heat</text><text x="28" y="270" fill="#4d655b" font-size="21">Failure recovery</text></g>
    <g transform="translate(1260 300)"><rect width="270" height="330" rx="14" fill="#f5f0e7"/><text x="28" y="60" fill="#e85c3a" font-size="24" font-weight="700">GATE 5</text><text x="28" y="112" fill="#152820" font-size="34" font-weight="800">HANDOFF</text><text x="28" y="165" fill="#4d655b" font-size="21">Three-step start</text><text x="28" y="200" fill="#4d655b" font-size="21">Licenses + backups</text><text x="28" y="235" fill="#4d655b" font-size="21">Cable photos</text><text x="28" y="270" fill="#4d655b" font-size="21">Maintenance date</text></g>
    <path d="M350 465H375M645 465H670M940 465H965M1235 465H1260" stroke="#66d6a8" stroke-width="8"/>
    <rect x="80" y="700" width="1450" height="105" rx="14" fill="#1e3a30" stroke="#66d6a8" stroke-width="3"/>
    <text x="120" y="766" fill="#ffffff" font-size="28">Final payment follows a real round and recovery test, not merely finished trim.</text>
  </g>
</svg>
