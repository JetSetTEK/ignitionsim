<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0b1118"/><stop offset="1" stop-color="#0f1a25"/></linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.08" r="0.75"><stop offset="0" stop-color="#f59e0b" stop-opacity="0.16"/><stop offset="1" stop-color="#f59e0b" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M44 0H0V44" fill="none" stroke="#25384a" stroke-width="1" opacity="0.3"/></pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <rect x="72" y="60" width="14" height="14" fill="#f59e0b"/>
   <text x="100" y="73" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="18" font-weight="700" fill="#f59e0b" text-anchor="start" letter-spacing="4">COCKPITS · TORQUE EACH TIER HOLDS</text>
   <text x="72" y="128" font-family="'Helvetica Neue',Arial,sans-serif" font-size="44" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="-0.5">The Rigidity Ladder</text>
   <rect x="72" y="146" width="150" height="5" rx="2.5" fill="#f59e0b"/>
  <line x1="104" y1="852" x2="104" y2="204" stroke="#f59e0b" stroke-width="3"/><path d="M104 192 l-9 16 h18 z" fill="#f59e0b"/><text x="94" y="526" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="700" fill="#f59e0b" letter-spacing="3" text-anchor="middle" transform="rotate(-90 94 526)">RIGIDITY  /  MAX WHEELBASE TORQUE  →</text><rect x="150" y="701" width="1378" height="151" rx="14" ry="14" fill="#16222e" stroke="#f59e0b" stroke-width="1" opacity="1"/><rect x="150" y="701" width="10" height="151" fill="#f59e0b" opacity="0.50"/><text x="180" y="741" font-family="'Helvetica Neue',Arial,sans-serif" font-size="21" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">Desk clamp</text><text x="180" y="771" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">On a heavy solid desk. Flexes above 8Nm and hates a hard load-cell brake. ~$40–60.</text><rect x="1274" y="746.5" width="240" height="60" rx="12" ry="12" fill="#0b1118" stroke="#f59e0b" stroke-width="1.5" opacity="1"/><text x="1394" y="774.5" font-family="'Helvetica Neue',Arial,sans-serif" font-size="23" font-weight="800" fill="#f59e0b" text-anchor="middle" letter-spacing="0">5–8 Nm</text><text x="1394" y="798.5" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="13" font-weight="600" fill="#8fa4b6" text-anchor="middle" letter-spacing="0">~$40–60</text><rect x="207" y="534" width="1321" height="151" rx="14" ry="14" fill="#16222e" stroke="#f59e0b" stroke-width="1" opacity="1"/><rect x="207" y="534" width="10" height="151" fill="#f59e0b" opacity="0.62"/><text x="237" y="574" font-family="'Helvetica Neue',Arial,sans-serif" font-size="21" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">Foldable cockpit — NLR GTLite</text><text x="237" y="604" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">Rigid reclined seating position that folds flat for apartments. Entry + mid direct drive.</text><rect x="1274" y="579.5" width="240" height="60" rx="12" ry="12" fill="#0b1118" stroke="#f59e0b" stroke-width="1.5" opacity="1"/><text x="1394" y="607.5" font-family="'Helvetica Neue',Arial,sans-serif" font-size="23" font-weight="800" fill="#f59e0b" text-anchor="middle" letter-spacing="0">8–10 Nm</text><text x="1394" y="631.5" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="13" font-weight="600" fill="#8fa4b6" text-anchor="middle" letter-spacing="0">~$229</text><rect x="263" y="367" width="1265" height="151" rx="14" ry="14" fill="#16222e" stroke="#f59e0b" stroke-width="1" opacity="1"/><rect x="263" y="367" width="10" height="151" fill="#f59e0b" opacity="0.74"/><text x="293" y="407" font-family="'Helvetica Neue',Arial,sans-serif" font-size="21" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">Steel cockpit — NLR GT Track</text><text x="293" y="437" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">Complete one-box package with a reclined race seat. Stiff enough for the torque most drivers ever run.</text><rect x="1274" y="412.5" width="240" height="60" rx="12" ry="12" fill="#0b1118" stroke="#f59e0b" stroke-width="1.5" opacity="1"/><text x="1394" y="440.5" font-family="'Helvetica Neue',Arial,sans-serif" font-size="23" font-weight="800" fill="#f59e0b" text-anchor="middle" letter-spacing="0">12–15 Nm</text><text x="1394" y="464.5" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="13" font-weight="600" fill="#8fa4b6" text-anchor="middle" letter-spacing="0">~$899</text><rect x="320" y="200" width="1208" height="151" rx="14" ry="14" fill="#16222e" stroke="#f59e0b" stroke-width="1" opacity="1"/><rect x="320" y="200" width="10" height="151" fill="#f59e0b" opacity="0.86"/><text x="350" y="240" font-family="'Helvetica Neue',Arial,sans-serif" font-size="21" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">80/20 aluminium — Trak Racer TR160 / Sim-Lab P1-X</text><text x="350" y="270" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">No flex under any consumer base. Carries triples, motion and tactile; never stops being upgradeable.</text><rect x="1274" y="245.5" width="240" height="60" rx="12" ry="12" fill="#0b1118" stroke="#f59e0b" stroke-width="1.5" opacity="1"/><text x="1394" y="273.5" font-family="'Helvetica Neue',Arial,sans-serif" font-size="23" font-weight="800" fill="#f59e0b" text-anchor="middle" letter-spacing="0">15 Nm+</text><text x="1394" y="297.5" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="13" font-weight="600" fill="#8fa4b6" text-anchor="middle" letter-spacing="0">$879–1,299</text><rect x="150" y="860" width="1378" height="46" rx="14" ry="14" fill="#1a1206" stroke="#f59e0b" stroke-width="1" opacity="1"/><text x="174" y="888" font-size="18" fill="#f59e0b" font-family="'Helvetica Neue',Arial,sans-serif">⚑</text><text x="204" y="884" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">A stronger base doesn't fix a weaker rig — it exposes it. Buy the frame to your rung first.</text>
  <line x1="72" y1="914" x2="1528" y2="914" stroke="#2b3e51" stroke-width="1" opacity="0.6"/>
   <text x="72" y="960" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="16" font-weight="700" fill="#8fa4b6" text-anchor="start" letter-spacing="3">IGNITIONSIM.COM</text>
   <rect x="1418" y="938" width="110" height="34" rx="17" fill="#f59e0b" opacity="0.16"/>
   <text x="1473" y="960" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="700" fill="#f59e0b" text-anchor="middle" letter-spacing="2">RACING</text>
</svg>