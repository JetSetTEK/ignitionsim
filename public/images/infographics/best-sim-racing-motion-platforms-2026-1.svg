<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0b1118"/><stop offset="1" stop-color="#0f1a25"/></linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.08" r="0.75"><stop offset="0" stop-color="#f59e0b" stop-opacity="0.16"/><stop offset="1" stop-color="#f59e0b" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M44 0H0V44" fill="none" stroke="#25384a" stroke-width="1" opacity="0.3"/></pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <rect x="72" y="60" width="14" height="14" fill="#f59e0b"/>
   <text x="100" y="73" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="18" font-weight="700" fill="#f59e0b" text-anchor="start" letter-spacing="4">WHICH AXIS MAKES THE REAR STEP OUT</text>
   <text x="72" y="128" font-family="'Helvetica Neue',Arial,sans-serif" font-size="44" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="-0.5">2DOF vs 3DOF vs 6DOF</text>
   <rect x="72" y="146" width="150" height="5" rx="2.5" fill="#f59e0b"/>
  <rect x="72" y="200" width="469.3333333333333" height="616" rx="14" ry="14" fill="#16222e" stroke="#2b3e51" stroke-width="1" opacity="1"/><path d="M72 216 q0 -16 16 -16 h437.3333333333333 q16 0 16 16 v54 h-469.3333333333333 z" fill="#0b1118"/><text x="306.66666666666663" y="246" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="18" font-weight="800" fill="#f59e0b" text-anchor="middle" letter-spacing="2">2DOF</text><text x="306.66666666666663" y="308" font-family="'Helvetica Neue',Arial,sans-serif" font-size="21" font-weight="800" fill="#eef5fb" text-anchor="middle" letter-spacing="0">Pitch + Roll</text><circle cx="96" cy="357" r="3.5" fill="#f59e0b"/><text x="112" y="362" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Pitch = braking dive &amp; squat</text><circle cx="96" cy="394.76" r="3.5" fill="#f59e0b"/><text x="112" y="399.76" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Roll = cornering lean</text><circle cx="96" cy="432.52" r="3.5" fill="#f59e0b"/><text x="112" y="437.52" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Convincing for clean grip racing</text><circle cx="96" cy="470.28" r="3.5" fill="#f59e0b"/><text x="112" y="475.28" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Cannot rotate — no rear-step cue</text><circle cx="96" cy="508.03999999999996" r="3.5" fill="#f59e0b"/><text x="112" y="513.04" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">NLR Motion V3 · ~$2,999</text><rect x="565.3333333333333" y="200" width="469.3333333333333" height="616" rx="14" ry="14" fill="#1c2b3a" stroke="#f59e0b" stroke-width="2.5" opacity="1"/><path d="M565.3333333333333 216 q0 -16 16 -16 h437.3333333333333 q16 0 16 16 v54 h-469.3333333333333 z" fill="#f59e0b"/><text x="799.9999999999999" y="246" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="18" font-weight="800" fill="#0b1118" text-anchor="middle" letter-spacing="2">3DOF ★ SWEET SPOT</text><text x="799.9999999999999" y="308" font-family="'Helvetica Neue',Arial,sans-serif" font-size="21" font-weight="800" fill="#eef5fb" text-anchor="middle" letter-spacing="0">+ Yaw (traction loss)</text><circle cx="589.3333333333333" cy="357" r="3.5" fill="#f59e0b"/><text x="605.3333333333333" y="362" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Platform rotates on a front pivot</text><circle cx="589.3333333333333" cy="394.76" r="3.5" fill="#f59e0b"/><text x="605.3333333333333" y="399.76" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">The rig turns as the back end lets go</text><circle cx="589.3333333333333" cy="432.52" r="3.5" fill="#f59e0b"/><text x="605.3333333333333" y="437.52" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">The single most-craved racing cue</text><circle cx="589.3333333333333" cy="470.28" r="3.5" fill="#f59e0b"/><text x="605.3333333333333" y="475.28" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Regret-proof for sim racing</text><circle cx="589.3333333333333" cy="508.03999999999996" r="3.5" fill="#f59e0b"/><text x="605.3333333333333" y="513.04" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">DOF Reality H3 · ~$2,999 base</text><rect x="1058.6666666666665" y="200" width="469.3333333333333" height="616" rx="14" ry="14" fill="#16222e" stroke="#2b3e51" stroke-width="1" opacity="1"/><path d="M1058.6666666666665 216 q0 -16 16 -16 h437.3333333333333 q16 0 16 16 v54 h-469.3333333333333 z" fill="#0b1118"/><text x="1293.3333333333333" y="246" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="18" font-weight="800" fill="#f59e0b" text-anchor="middle" letter-spacing="2">6DOF</text><text x="1293.3333333333333" y="308" font-family="'Helvetica Neue',Arial,sans-serif" font-size="21" font-weight="800" fill="#eef5fb" text-anchor="middle" letter-spacing="0">+ Heave · Surge · Sway</text><circle cx="1082.6666666666665" cy="357" r="3.5" fill="#f59e0b"/><text x="1098.6666666666665" y="362" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Full commercial-simulator envelope</text><circle cx="1082.6666666666665" cy="394.76" r="3.5" fill="#f59e0b"/><text x="1098.6666666666665" y="399.76" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Vertical + fore/aft + lateral slide</text><circle cx="1082.6666666666665" cy="432.52" r="3.5" fill="#f59e0b"/><text x="1098.6666666666665" y="437.52" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Aspirational, not a home budget</text><circle cx="1082.6666666666665" cy="470.28" r="3.5" fill="#f59e0b"/><text x="1098.6666666666665" y="475.28" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Professional platforms</text><circle cx="1082.6666666666665" cy="508.03999999999996" r="3.5" fill="#f59e0b"/><text x="1098.6666666666665" y="513.04" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">$10,000+</text><rect x="72" y="836" width="1456" height="56" rx="14" ry="14" fill="#0b1118" stroke="#f59e0b" stroke-width="1.5" opacity="1"/><rect x="72" y="836" width="8" height="56" fill="#f59e0b"/><text x="102" y="870" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">2DOF (NLR V3) and 3DOF (DOF Reality H3) sit at roughly the SAME base price (~$2,999). When the extra axis is free — buy the axis.</text>
  <line x1="72" y1="914" x2="1528" y2="914" stroke="#2b3e51" stroke-width="1" opacity="0.6"/>
   <text x="72" y="960" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="16" font-weight="700" fill="#8fa4b6" text-anchor="start" letter-spacing="3">IGNITIONSIM.COM</text>
   <rect x="1418" y="938" width="110" height="34" rx="17" fill="#f59e0b" opacity="0.16"/>
   <text x="1473" y="960" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="700" fill="#f59e0b" text-anchor="middle" letter-spacing="2">RACING</text>
</svg>