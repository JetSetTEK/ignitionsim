<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0b1118"/><stop offset="1" stop-color="#0f1a25"/></linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.08" r="0.75"><stop offset="0" stop-color="#f59e0b" stop-opacity="0.16"/><stop offset="1" stop-color="#f59e0b" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M44 0H0V44" fill="none" stroke="#25384a" stroke-width="1" opacity="0.3"/></pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <rect x="72" y="60" width="14" height="14" fill="#f59e0b"/>
   <text x="100" y="73" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="18" font-weight="700" fill="#f59e0b" text-anchor="start" letter-spacing="4">THE CHEAPEST CURE IN SIM RACING</text>
   <text x="72" y="128" font-family="'Helvetica Neue',Arial,sans-serif" font-size="44" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="-0.5">Powered vs Bus-Powered USB Hub</text>
   <rect x="72" y="146" width="150" height="5" rx="2.5" fill="#f59e0b"/>
  <rect x="72" y="200" width="1456" height="64" rx="14" ry="14" fill="#1c2b3a" stroke="#f59e0b" stroke-width="1.5" opacity="1"/><text x="96" y="227" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="14" font-weight="800" fill="#f59e0b" text-anchor="start" letter-spacing="1">A MODERN DIRECT-DRIVE RIG =</text><text x="96" y="250" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="600" fill="#eef5fb" text-anchor="start" letter-spacing="0">direct-drive base · pedals · wheel · shifter · handbrake · button box · tactile interface  (5–8 USB devices)</text><rect x="72" y="290" width="715" height="458" rx="14" ry="14" fill="#16222e" stroke="#f87171" stroke-width="2" opacity="1"/><rect x="72" y="290" width="715" height="58" rx="14" fill="#f87171" opacity="0.16"/><text x="96" y="327" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="800" fill="#f87171" text-anchor="start" letter-spacing="0">Bus-powered hub — no wall adapter</text><text x="96" y="382" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17.5" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">It only re-splits the trickle of current the PC’s single USB port</text><text x="96" y="405.45" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17.5" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">provides, shared across every downstream device.</text><rect x="92" y="598" width="675" height="130" rx="12" ry="12" fill="#0b1118" stroke="#f87171" stroke-width="1.5" opacity="1"/><circle cx="120" cy="632" r="16" fill="#f87171"/><text x="120" y="639" font-family="'Helvetica Neue',Arial,sans-serif" font-size="19" font-weight="800" fill="#0b1118" text-anchor="middle" letter-spacing="0">✕</text><text x="148" y="638" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="16" font-weight="800" fill="#f87171" text-anchor="start" letter-spacing="1">DROPOUT RISK</text><text x="96" y="670" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">Random, un-reproducible mid-race disconnects (wheel or pedals drop out) that</text><text x="96" y="690.8" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">get wrongly blamed on drivers.</text><rect x="813" y="290" width="715" height="458" rx="14" ry="14" fill="#16222e" stroke="#34d399" stroke-width="2" opacity="1"/><rect x="813" y="290" width="715" height="58" rx="14" fill="#34d399" opacity="0.16"/><text x="837" y="327" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="800" fill="#34d399" text-anchor="start" letter-spacing="0">Powered hub — its own wall adapter</text><text x="837" y="382" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17.5" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Sabrent 10-Port: 60W, 12V/5A adapter delivers a full, stable ~5V feed</text><text x="837" y="405.45" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17.5" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">to every port at once.</text><rect x="833" y="598" width="675" height="130" rx="12" ry="12" fill="#0b1118" stroke="#34d399" stroke-width="1.5" opacity="1"/><circle cx="861" cy="632" r="16" fill="#34d399"/><text x="861" y="639" font-family="'Helvetica Neue',Arial,sans-serif" font-size="19" font-weight="800" fill="#0b1118" text-anchor="middle" letter-spacing="0">✓</text><text x="889" y="638" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="16" font-weight="800" fill="#34d399" text-anchor="start" letter-spacing="1">STABLE</text><text x="837" y="670" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">High-draw always-on devices stay connected; per-port power switches; one cable</text><text x="837" y="690.8" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">back to the PC.</text><rect x="72" y="764" width="1456" height="54" rx="14" ry="14" fill="#1a1206" stroke="#f59e0b" stroke-width="1.5" opacity="1"/><text x="94" y="798" font-size="18" fill="#f59e0b" font-family="'Helvetica Neue',Arial,sans-serif">⚑</text><text x="124" y="794" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16.5" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">4+ USB peripherals on a rig = you need a POWERED hub, not a bus-powered one. Cost of the fix: ~$36 — the cheapest cure for the most infuriating problem in</text><text x="124" y="813.8" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16.5" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">sim racing.</text>
  <line x1="72" y1="914" x2="1528" y2="914" stroke="#2b3e51" stroke-width="1" opacity="0.6"/>
   <text x="72" y="960" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="16" font-weight="700" fill="#8fa4b6" text-anchor="start" letter-spacing="3">IGNITIONSIM.COM</text>
   <rect x="1418" y="938" width="110" height="34" rx="17" fill="#f59e0b" opacity="0.16"/>
   <text x="1473" y="960" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="700" fill="#f59e0b" text-anchor="middle" letter-spacing="2">RACING</text>
</svg>