  <rect x="72" y="200" width="469.3333333333333" height="288" rx="14" ry="14" fill="#16222e" stroke="#2b3e51" stroke-width="1" opacity="1"/><rect x="94" y="224" width="30" height="30" rx="7" ry="7" fill="none" stroke="#f59e0b" stroke-width="2.5" opacity="1"/><path d="M101 239 l6 7 l12 -15" fill="none" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><text x="138" y="246" font-family="'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">Powered USB hub</text><text x="94" y="286" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="700" fill="#f59e0b" text-anchor="start" letter-spacing="0">Sabrent 10-Port · ~$36</text><text x="94" y="318" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">Fixes random mid-race USB dropouts when a rig runs</text><text x="94" y="338.8" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">4–8 devices.</text><rect x="94" y="430" width="425.3333333333333" height="40" rx="9" ry="9" fill="#0b1118" stroke="#8fa4b6" stroke-width="1.5" opacity="1"/><text x="306.66666666666663" y="456" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="800" fill="#8fa4b6" text-anchor="middle" letter-spacing="1.5">BUY FIRST</text><rect x="565.3333333333333" y="200" width="469.3333333333333" height="288" rx="14" ry="14" fill="#16222e" stroke="#2b3e51" stroke-width="1" opacity="1"/><rect x="587.3333333333333" y="224" width="30" height="30" rx="7" ry="7" fill="none" stroke="#f59e0b" stroke-width="2.5" opacity="1"/><path d="M594.3333333333333 239 l6 7 l12 -15" fill="none" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><text x="631.3333333333333" y="246" font-family="'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">Ambient / bias light</text><text x="587.3333333333333" y="286" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="700" fill="#f59e0b" text-anchor="start" letter-spacing="0">Govee RGBIC bars · ~$60–80</text><text x="587.3333333333333" y="318" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">Cuts eye strain in a dark room and makes the rig</text><text x="587.3333333333333" y="338.8" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">look finished.</text><rect x="587.3333333333333" y="430" width="425.3333333333333" height="40" rx="9" ry="9" fill="#0b1118" stroke="#8fa4b6" stroke-width="1.5" opacity="1"/><text x="799.9999999999999" y="456" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="800" fill="#8fa4b6" text-anchor="middle" letter-spacing="1.5">BUY EARLY</text><rect x="1058.6666666666665" y="200" width="469.3333333333333" height="288" rx="14" ry="14" fill="#16222e" stroke="#2b3e51" stroke-width="1" opacity="1"/><rect x="1080.6666666666665" y="224" width="30" height="30" rx="7" ry="7" fill="none" stroke="#f59e0b" stroke-width="2.5" opacity="1"/><path d="M1087.6666666666665 239 l6 7 l12 -15" fill="none" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><text x="1124.6666666666665" y="246" font-family="'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">Wireless headset</text><text x="1080.6666666666665" y="286" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="700" fill="#f59e0b" text-anchor="start" letter-spacing="0">SteelSeries Arctis Nova 7 · ~$179</text><text x="1080.6666666666665" y="318" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">No cable snag on the shifter, hear cars alongside,</text><text x="1080.6666666666665" y="338.8" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">midnight-friendly.</text><rect x="1080.6666666666665" y="430" width="425.3333333333333" height="40" rx="9" ry="9" fill="#0b1118" stroke="#8fa4b6" stroke-width="1.5" opacity="1"/><text x="1293.3333333333333" y="456" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="800" fill="#8fa4b6" text-anchor="middle" letter-spacing="1.5">COMFORT</text><rect x="72" y="510" width="469.3333333333333" height="288" rx="14" ry="14" fill="#16222e" stroke="#2b3e51" stroke-width="1" opacity="1"/><rect x="94" y="534" width="30" height="30" rx="7" ry="7" fill="none" stroke="#f59e0b" stroke-width="2.5" opacity="1"/><path d="M101 549 l6 7 l12 -15" fill="none" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><text x="138" y="556" font-family="'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">Cable management</text><text x="94" y="596" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="700" fill="#f59e0b" text-anchor="start" letter-spacing="0">sleeving / mount box · ~$25–60</text><text x="94" y="628" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">Tames the nest of power bricks under the seat.</text><rect x="94" y="740" width="425.3333333333333" height="40" rx="9" ry="9" fill="#0b1118" stroke="#8fa4b6" stroke-width="1.5" opacity="1"/><text x="306.66666666666663" y="766" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="800" fill="#8fa4b6" text-anchor="middle" letter-spacing="1.5">SAME AFTERNOON</text><rect x="565.3333333333333" y="510" width="469.3333333333333" height="288" rx="14" ry="14" fill="#16222e" stroke="#2b3e51" stroke-width="1" opacity="1"/><rect x="587.3333333333333" y="534" width="30" height="30" rx="7" ry="7" fill="none" stroke="#f59e0b" stroke-width="2.5" opacity="1"/><path d="M594.3333333333333 549 l6 7 l12 -15" fill="none" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><text x="631.3333333333333" y="556" font-family="'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">Comfort / QoL</text><text x="587.3333333333333" y="596" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="700" fill="#f59e0b" text-anchor="start" letter-spacing="0">lap keyboard, cup + tablet mount · ~$15–40</text><text x="587.3333333333333" y="628" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">Menu nav without balancing a keyboard; livable</text><text x="587.3333333333333" y="648.8" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">long stints.</text><rect x="587.3333333333333" y="740" width="425.3333333333333" height="40" rx="9" ry="9" fill="#0b1118" stroke="#8fa4b6" stroke-width="1.5" opacity="1"/><text x="799.9999999999999" y="766" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="800" fill="#8fa4b6" text-anchor="middle" letter-spacing="1.5">NICE TO HAVE</text><rect x="1058.6666666666665" y="510" width="469.3333333333333" height="288" rx="14" ry="14" fill="#16222e" stroke="#2b3e51" stroke-width="1" opacity="1"/><rect x="1080.6666666666665" y="534" width="30" height="30" rx="7" ry="7" fill="none" stroke="#f59e0b" stroke-width="2.5" opacity="1"/><path d="M1087.6666666666665 549 l6 7 l12 -15" fill="none" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><text x="1124.6666666666665" y="556" font-family="'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">The one big touch</text><text x="1080.6666666666665" y="596" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="700" fill="#f59e0b" text-anchor="start" letter-spacing="0">ButtKicker Gamer PRO · ~$350</text><text x="1080.6666666666665" y="628" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">Feel wheelspin, lockups, kerbs and shift kicks</text><text x="1080.6666666666665" y="648.8" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">through the seat.</text><rect x="1080.6666666666665" y="740" width="425.3333333333333" height="40" rx="9" ry="9" fill="#0b1118" stroke="#8fa4b6" stroke-width="1.5" opacity="1"/><text x="1293.3333333333333" y="766" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="800" fill="#8fa4b6" text-anchor="middle" letter-spacing="1.5">BUY LAST</text><rect x="72" y="814" width="1456" height="50" rx="14" ry="14" fill="#101b12" stroke="#34d399" stroke-width="1" opacity="1"/><text x="94" y="847" font-size="18" fill="#34d399" font-family="'Helvetica Neue',Arial,sans-serif">✓</text><text x="122" y="844" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16.5" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">The four cheap finishing touches (hub + lighting + headset + cable mgmt) land under ~$300 — less than one decent set of pedal