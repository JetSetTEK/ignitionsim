<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1700" viewBox="0 0 900 1700" role="img" aria-labelledby="title desc">
  <title id="title">Mobile truck simulator installation map</title>
  <desc id="desc">Large mobile-friendly diagrams for truck wheel desk fit, HORI connections, and MOZA connections.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fbfcfd"/><stop offset="1" stop-color="#e6edf3"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#101820" flood-opacity=".15"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#ff6a2a"/></marker>
    <style>
      .k{font:800 24px ui-monospace,monospace;fill:#ff5e1a}.h{font:900 52px system-ui,sans-serif;fill:#101820}.sh{font:900 34px system-ui,sans-serif;fill:#101820}.b{font:600 28px system-ui,sans-serif;fill:#435564}.m{font:800 23px ui-monospace,monospace;fill:#526777}.w{fill:#fff}.line{stroke:#ff6a2a;stroke-width:8;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="900" height="1700" rx="42" fill="url(#bg)"/>
  <text x="50" y="70" class="k">IGNITIONSIM / INSTALL MAP</text>
  <text x="50" y="135" class="h">Build the desk first.</text>

  <rect x="45" y="195" width="810" height="425" rx="28" fill="#fff" filter="url(#shadow)"/>
  <text x="80" y="250" class="sh">1. Measure reach and clamp depth</text>
  <rect x="170" y="335" width="560" height="90" rx="16" fill="#263746"/>
  <circle cx="450" cy="480" r="105" fill="none" stroke="#ff6a2a" stroke-width="24"/>
  <path d="M450 480L270 545M450 480L630 545" stroke="#101820" stroke-width="10"/>
  <text x="450" y="305" text-anchor="middle" class="m">CHECK CROSSBARS + CLAMP DEPTH</text>
  <text x="80" y="590" class="b">The 400 mm rim and angled base can</text>
  <text x="80" y="625" class="b">move your chair away from the display.</text>

  <rect x="45" y="675" width="810" height="430" rx="28" fill="#101820" filter="url(#shadow)"/>
  <text x="80" y="735" class="sh w">2. HORI: update before mapping</text>
  <rect x="80" y="800" width="220" height="90" rx="18" fill="#ff6a2a"/><text x="190" y="856" text-anchor="middle" class="m w">WHEEL</text>
  <rect x="500" y="800" width="220" height="90" rx="18" fill="#fff"/><text x="610" y="856" text-anchor="middle" class="m">PC USB</text>
  <rect x="80" y="950" width="220" height="90" rx="18" fill="#fff"/><text x="190" y="1006" text-anchor="middle" class="m">PEDALS</text>
  <rect x="500" y="950" width="220" height="90" rx="18" fill="#fff"/><text x="610" y="1006" text-anchor="middle" class="m">SHIFTER USB</text>
  <path d="M300 845H500M190 950V890M610 950V890" class="line"/>
  <text x="80" y="1080" class="m w">PEDALS INTO WHEEL · WHEEL + SHIFTER TO PC</text>

  <rect x="45" y="1160" width="810" height="430" rx="28" fill="#153b4e" filter="url(#shadow)"/>
  <text x="80" y="1220" class="sh w">3. MOZA: price the missing controls</text>
  <rect x="80" y="1285" width="220" height="90" rx="18" fill="#2098d2"/><text x="190" y="1341" text-anchor="middle" class="m w">R5 BASE</text>
  <rect x="500" y="1285" width="220" height="90" rx="18" fill="#fff"/><text x="610" y="1341" text-anchor="middle" class="m">PC USB</text>
  <rect x="80" y="1435" width="220" height="90" rx="18" fill="#fff"/><text x="190" y="1491" text-anchor="middle" class="m">2 PEDALS</text>
  <rect x="500" y="1435" width="220" height="90" rx="18" fill="#fff"/><text x="610" y="1491" text-anchor="middle" class="m">ADD-ONS</text>
  <path d="M300 1330H500M190 1435V1375M610 1435V1375" stroke="#2098d2" stroke-width="8" fill="none" marker-end="url(#arrow)"/>
  <text x="80" y="1565" class="m w">CLUTCH · SHIFTER · STALKS ARE SEPARATE</text>
  <text x="450" y="1655" text-anchor="middle" class="m">THE BORING CHECKLIST SAVES THE WEEKEND.</text>
</svg>
