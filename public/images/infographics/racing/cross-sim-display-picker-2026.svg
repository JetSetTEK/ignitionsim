    <text x="92" y="92" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="900" fill="#22d3ee">MONITOR, VR, OR BOTH?</text>
    <text x="92" y="154" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="900" fill="#fff">Choose the compromise you will still tolerate</text><text x="92" y="201.84" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="900" fill="#fff">after two hours.</text>
