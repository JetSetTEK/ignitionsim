    <rect x="54" y="704" width="1290" height="66" rx="12" fill="#fff" fill-opacity=".1" stroke="#fff" stroke-opacity=".16"/>
    <text x="84" y="745" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="650" fill="#e5eef0">Racing, flight, space, marine, and golf do not reward the same display choice. Start with the game</text><text x="84" y="771.45" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="650" fill="#e5eef0">you play weekly.</text>
