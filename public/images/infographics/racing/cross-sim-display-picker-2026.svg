      <circle cx="80" cy="416" r="6" fill="#22d3ee"/><text x="98" y="424" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1d2a34">Instant entry and crisp</text><text x="98" y="449.3" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1d2a34">text</text><circle cx="80" cy="480" r="6" fill="#22d3ee"/><text x="98" y="488" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1d2a34">Shared room friendly</text><circle cx="80" cy="544" r="6" fill="#22d3ee"/><text x="98" y="552" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1d2a34">Needs width and GPU</text>
