<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">HORI Truck Control System versus MOZA TSW decision map</title>
  <desc id="desc">Decision tree for choosing HORI, MOZA, or keeping an existing wheel for American Truck Simulator and Euro Truck Simulator 2.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="0.52" stop-color="#263746"/>
      <stop offset="1" stop-color="#542919"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity=".32"/>
    </filter>
    <style>
      .k { font: 800 24px system-ui, sans-serif; fill: #ff6a2a; }
      .h { font: 900 54px system-ui, sans-serif; fill: #fff; }
      .q { font: 800 30px system-ui, sans-serif; fill: #101820; }
      .b { font: 600 24px system-ui, sans-serif; fill: #415160; }
      .sm { font: 800 20px ui-monospace, monospace; fill: #647687; }
      .white { fill: #fff; }
      .line { stroke: #ffb247; stroke-width: 6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect width="1600" height="1000" rx="52" fill="url(#bg)"/>
  <path d="M0 160H1600M0 840H1600" stroke="#fff" stroke-opacity=".08"/>
  <text x="90" y="92" class="k">IGNITIONSIM / DUKE'S THREE-LANE VERDICT</text>
  <text x="90" y="154" class="h">Which truck-sim wheel should you buy?</text>

  <rect x="475" y="210" width="650" height="130" rx="24" fill="#fff" filter="url(#shadow)"/>
  <text x="800" y="264" text-anchor="middle" class="q">Is this rig mainly for ETS2 or ATS?</text>
  <text x="800" y="307" text-anchor="middle" class="b">Not racing. Not console. Proper truck nights.</text>

  <path d="M800 340V395H360V440M800 395H1240V440" class="line"/>
  <text x="610" y="382" text-anchor="middle" class="sm">YES</text>
  <text x="1000" y="382" text-anchor="middle" class="sm">NO / MULTI-SIM</text>

  <rect x="75" y="440" width="570" height="170" rx="24" fill="#fff" filter="url(#shadow)"/>
  <text x="360" y="494" text-anchor="middle" class="q">Do mapped truck controls matter</text>
  <text x="360" y="533" text-anchor="middle" class="q">more than steering fidelity?</text>
  <text x="360" y="580" text-anchor="middle" class="b">Stalks, range/splitter, button panel, three pedals.</text>

  <rect x="955" y="440" width="570" height="170" rx="24" fill="#fff" filter="url(#shadow)"/>
  <text x="1240" y="494" text-anchor="middle" class="q">Do you want direct drive,</text>
  <text x="1240" y="533" text-anchor="middle" class="q">other sims, and upgrades?</text>
  <text x="1240" y="580" text-anchor="middle" class="b">Better steering feel; buy missing controls separately.</text>

  <path d="M360 610V675H210V720M360 675H510V720M1240 610V720" class="line"/>
  <text x="268" y="660" text-anchor="middle" class="sm">YES</text>
  <text x="452" y="660" text-anchor="middle" class="sm">NO / UNSURE</text>

  <rect x="70" y="720" width="430" height="195" rx="26" fill="#ff6a2a" filter="url(#shadow)"/>
  <text x="285" y="778" text-anchor="middle" class="q white">BUY HORI</text>
  <text x="285" y="823" text-anchor="middle" class="b white">The complete truck appliance.</text>
  <text x="285" y="866" text-anchor="middle" class="b white">Accept gear-driven FFB and plastic.</text>

  <rect x="585" y="720" width="430" height="195" rx="26" fill="#f3f6f8" filter="url(#shadow)"/>
  <text x="800" y="778" text-anchor="middle" class="q">KEEP YOUR WHEEL</text>
  <text x="800" y="823" text-anchor="middle" class="b">G29/G923/T300 first.</text>
  <text x="800" y="866" text-anchor="middle" class="b">Prove the habit before $500+.</text>

  <rect x="1100" y="720" width="430" height="195" rx="26" fill="#1d91d0" filter="url(#shadow)"/>
  <text x="1315" y="778" text-anchor="middle" class="q white">BUY MOZA</text>
  <text x="1315" y="823" text-anchor="middle" class="b white">The better steering system.</text>
  <text x="1315" y="866" text-anchor="middle" class="b white">Budget clutch, shifter, stalks.</text>

  <text x="800" y="966" text-anchor="middle" class="sm white">DUKE'S RULE: BUY THE CONTROL WORKFLOW YOU WILL USE, NOT THE BIGGEST BOX.</text>
</svg>
