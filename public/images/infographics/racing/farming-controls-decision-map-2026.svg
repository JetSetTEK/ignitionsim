<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Farming Simulator 25 control system decision map</title>
  <desc id="desc">Decision map for choosing a Thrustmaster T128 SimTask Farming Pack, standalone FarmStick, HORI Farming Vehicle Control System, or discounted Logitech Heavy Equipment Bundle.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f2830"/>
      <stop offset="0.5" stop-color="#244f42"/>
      <stop offset="1" stop-color="#8a4d21"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#061114" flood-opacity=".34"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0 0 10 5 0 10Z" fill="#ffb34f"/></marker>
    <style>
      .k{font:800 23px ui-monospace,monospace;fill:#ffb34f}.h{font:900 52px system-ui,sans-serif;fill:#fff}.q{font:850 29px system-ui,sans-serif;fill:#10232b}.b{font:600 22px system-ui,sans-serif;fill:#405762}.sm{font:800 18px ui-monospace,monospace;fill:#6d7f86}.white{fill:#fff}.line{stroke:#ffb34f;stroke-width:6;fill:none;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1600" height="1000" rx="52" fill="url(#bg)"/>
  <path d="M0 174H1600M0 886H1600" stroke="#fff" stroke-opacity=".09"/>
  <text x="82" y="82" class="k">IGNITIONSIM / DUKE'S FARM-CAB BUYER MAP</text>
  <text x="82" y="148" class="h">Buy by job, not by box.</text>

  <rect x="440" y="210" width="720" height="126" rx="24" fill="#fff" filter="url(#shadow)"/>
  <text x="800" y="263" text-anchor="middle" class="q">Already own a decent 900-degree wheel?</text>
  <text x="800" y="303" text-anchor="middle" class="b">G29, G920, G923, T300, T248, or better.</text>

  <path d="M800 336V390H310V448" class="line"/>
  <path d="M800 390H1110V448" class="line"/>
  <text x="520" y="377" text-anchor="middle" class="sm">YES</text>
  <text x="995" y="377" text-anchor="middle" class="sm">NO</text>

  <rect x="65" y="448" width="490" height="174" rx="24" fill="#fff" filter="url(#shadow)"/>
  <text x="310" y="500" text-anchor="middle" class="q">Do loader, crane, or</text>
  <text x="310" y="537" text-anchor="middle" class="q">forestry jobs feel clumsy?</text>
  <text x="310" y="581" text-anchor="middle" class="b">The joystick is the larger upgrade.</text>

  <rect x="855" y="448" width="510" height="174" rx="24" fill="#fff" filter="url(#shadow)"/>
  <text x="1110" y="500" text-anchor="middle" class="q">Need PlayStation 5 support</text>
  <text x="1110" y="537" text-anchor="middle" class="q">or a reusable driving wheel?</text>
  <text x="1110" y="581" text-anchor="middle" class="b">Favor the modular force-feedback path.</text>

  <path d="M310 622V690" class="line"/>
  <path d="M1110 622V675H880V720" class="line"/>
  <path d="M1110 675H1315V720" class="line"/>
  <text x="962" y="664" text-anchor="middle" class="sm">YES</text>
  <text x="1223" y="664" text-anchor="middle" class="sm">PC-ONLY CAB</text>

  <rect x="45" y="700" width="355" height="185" rx="24" fill="#efb83f" filter="url(#shadow)"/>
  <text x="222" y="756" text-anchor="middle" class="q">ADD FARMSTICK</text>
  <text x="222" y="799" text-anchor="middle" class="b">Best-value upgrade.</text>
  <text x="222" y="836" text-anchor="middle" class="b">Keep the wheel you trust.</text>

  <rect x="425" y="700" width="355" height="185" rx="24" fill="#eaf3ee" filter="url(#shadow)"/>
  <text x="602" y="756" text-anchor="middle" class="q">T128 FARM PACK</text>
  <text x="602" y="799" text-anchor="middle" class="b">Best new modular buy.</text>
  <text x="602" y="836" text-anchor="middle" class="b">Wheel + pedals + FarmStick.</text>

  <rect x="805" y="700" width="355" height="185" rx="24" fill="#28a78a" filter="url(#shadow)"/>
  <text x="982" y="756" text-anchor="middle" class="q white">T128 PS PACK</text>
  <text x="982" y="799" text-anchor="middle" class="b white">The clean console lane.</text>
  <text x="982" y="836" text-anchor="middle" class="b white">Verify exact game support.</text>

  <rect x="1185" y="700" width="370" height="185" rx="24" fill="#ff6a2a" filter="url(#shadow)"/>
  <text x="1370" y="756" text-anchor="middle" class="q white">HORI COMPLETE CAB</text>
  <text x="1370" y="799" text-anchor="middle" class="b white">Three pedals, 76 controls.</text>
  <text x="1370" y="836" text-anchor="middle" class="b white">Accept no true force feedback.</text>

  <rect x="455" y="908" width="690" height="60" rx="18" fill="#10232b"/>
  <text x="800" y="947" text-anchor="middle" class="sm white">LOGITECH: USED OR DEEPLY DISCOUNTED ONLY. THE SIDE PANEL IS THE GOOD BIT.</text>
</svg>
