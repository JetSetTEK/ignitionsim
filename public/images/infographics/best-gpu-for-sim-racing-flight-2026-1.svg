<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0b1118"/><stop offset="1" stop-color="#0f1a25"/></linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.08" r="0.75"><stop offset="0" stop-color="#38bdf8" stop-opacity="0.16"/><stop offset="1" stop-color="#38bdf8" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M44 0H0V44" fill="none" stroke="#25384a" stroke-width="1" opacity="0.3"/></pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <rect x="72" y="60" width="14" height="14" fill="#38bdf8"/>
   <text x="100" y="73" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="18" font-weight="700" fill="#38bdf8" text-anchor="start" letter-spacing="4">FLAT PANELS · MSFS 2024 WORST-CASE</text>
   <text x="72" y="128" font-family="'Helvetica Neue',Arial,sans-serif" font-size="44" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="-0.5">GPU Tier by Resolution</text>
   <rect x="72" y="146" width="150" height="5" rx="2.5" fill="#38bdf8"/>
  <rect x="72" y="195" width="1456" height="52" rx="14" ry="14" fill="#1c2b3a" stroke="#38bdf8" stroke-width="1.5" opacity="1"/><rect x="72" y="195" width="8" height="52" fill="#38bdf8"/><text x="102" y="227" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="700" fill="#eef5fb" text-anchor="start" letter-spacing="0">MSFS 2024 is the worst-case workload — size the GPU to the hardest sim you actually run.</text><rect x="72" y="265" width="770" height="90" rx="14" ry="14" fill="#16222e" stroke="#2b3e51" stroke-width="1" opacity="1"/><text x="96" y="306" font-family="'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">1440p single monitor</text><text x="96" y="332" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="500" fill="#8fa4b6" text-anchor="start" letter-spacing="0">1440p Ultra · the value floor</text><path d="M856 310 H1078" stroke="#38bdf8" stroke-width="3"/><path d="M1086 310 l-16 -10 v20 z" fill="#38bdf8"/><rect x="1098" y="265" width="430" height="90" rx="14" ry="14" fill="#1c2b3a" stroke="#38bdf8" stroke-width="1.5" opacity="1"/><rect x="1098" y="265" width="430" height="90" rx="14" fill="#38bdf8" opacity="0.10"/><text x="1120" y="318" font-family="'Helvetica Neue',Arial,sans-serif" font-size="23" font-weight="800" fill="#38bdf8" text-anchor="start" letter-spacing="0">RTX 5070</text><text x="1508" y="317" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="14" font-weight="600" fill="#8fa4b6" text-anchor="end" letter-spacing="0">12GB</text><rect x="72" y="369" width="770" height="90" rx="14" ry="14" fill="#16222e" stroke="#2b3e51" stroke-width="1" opacity="1"/><text x="96" y="410" font-family="'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">Ultrawide 3440 / 5120×1440</text><text x="96" y="436" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="500" fill="#8fa4b6" text-anchor="start" letter-spacing="0">34–49" extra pixels</text><path d="M856 414 H1078" stroke="#38bdf8" stroke-width="3"/><path d="M1086 414 l-16 -10 v20 z" fill="#38bdf8"/><rect x="1098" y="369" width="430" height="90" rx="14" ry="14" fill="#1c2b3a" stroke="#38bdf8" stroke-width="1.5" opacity="1"/><rect x="1098" y="369" width="430" height="90" rx="14" fill="#38bdf8" opacity="0.15"/><text x="1120" y="422" font-family="'Helvetica Neue',Arial,sans-serif" font-size="23" font-weight="800" fill="#38bdf8" text-anchor="start" letter-spacing="0">RTX 5080</text><text x="1508" y="421" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="14" font-weight="600" fill="#8fa4b6" text-anchor="end" letter-spacing="0">16GB</text><rect x="72" y="473" width="770" height="90" rx="14" ry="14" fill="#16222e" stroke="#2b3e51" stroke-width="1" opacity="1"/><text x="96" y="514" font-family="'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">Triple 1440p (~11M px)</text><text x="96" y="540" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="500" fill="#8fa4b6" text-anchor="start" letter-spacing="0">~180° FOV</text><path d="M856 518 H1078" stroke="#38bdf8" stroke-width="3"/><path d="M1086 518 l-16 -10 v20 z" fill="#38bdf8"/><rect x="1098" y="473" width="430" height="90" rx="14" ry="14" fill="#1c2b3a" stroke="#38bdf8" stroke-width="1.5" opacity="1"/><rect x="1098" y="473" width="430" height="90" rx="14" fill="#38bdf8" opacity="0.15"/><text x="1120" y="526" font-family="'Helvetica Neue',Arial,sans-serif" font-size="23" font-weight="800" fill="#38bdf8" text-anchor="start" letter-spacing="0">RTX 5080</text><text x="1508" y="525" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="14" font-weight="600" fill="#8fa4b6" text-anchor="end" letter-spacing="0">sweet spot</text><rect x="72" y="577" width="770" height="90" rx="14" ry="14" fill="#16222e" stroke="#2b3e51" stroke-width="1" opacity="1"/><text x="96" y="618" font-family="'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">4K single + heavy scenery</text><text x="96" y="644" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="500" fill="#8fa4b6" text-anchor="start" letter-spacing="0">photogrammetry cities</text><path d="M856 622 H1078" stroke="#38bdf8" stroke-width="3"/><path d="M1086 622 l-16 -10 v20 z" fill="#38bdf8"/><rect x="1098" y="577" width="430" height="90" rx="14" ry="14" fill="#1c2b3a" stroke="#38bdf8" stroke-width="1.5" opacity="1"/><rect x="1098" y="577" width="430" height="90" rx="14" fill="#38bdf8" opacity="0.20"/><text x="1120" y="630" font-family="'Helvetica Neue',Arial,sans-serif" font-size="23" font-weight="800" fill="#38bdf8" text-anchor="start" letter-spacing="0">RTX 5090</text><text x="1508" y="629" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="14" font-weight="600" fill="#8fa4b6" text-anchor="end" letter-spacing="0">32GB</text><rect x="72" y="683" width="1456" height="50" rx="14" ry="14" fill="#101820" stroke="#2b3e51" stroke-width="1" opacity="1"/><text x="94" y="713" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="13" font-weight="800" fill="#38bdf8" text-anchor="start" letter-spacing="2">NOTE</text><text x="182" y="709" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">Racing sims (iRacing, ACC) are lighter — a 5080 covers 4K there. VRAM matters most at 4K + max textures + VR: 16GB is the 5080 ceiling, 32GB the 5090.</text>
  <line x1="72" y1="914" x2="1528" y2="914" stroke="#2b3e51" stroke-width="1" opacity="0.6"/>
   <text x="72" y="960" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="16" font-weight="700" fill="#8fa4b6" text-anchor="start" letter-spacing="3">IGNITIONSIM.COM</text>
   <rect x="1418" y="938" width="110" height="34" rx="17" fill="#38bdf8" opacity="0.16"/>
   <text x="1473" y="960" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="700" fill="#38bdf8" text-anchor="middle" letter-spacing="2">FLIGHT</text>
</svg>