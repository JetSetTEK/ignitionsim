fill="#16222e" stroke="#2b3e51" stroke-width="1" opacity="1"/><path d="M442 216 q0 -16 16 -16 h314 q16 0 16 16 v54 h-346 z" fill="#0b1118"/><text x="615" y="246" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="18" font-weight="800" fill="#38bdf8" text-anchor="middle" letter-spacing="2">ALL-ROUNDER</text><text x="615" y="308" font-family="'Helvetica Neue',Arial,sans-serif" font-size="21" font-weight="800" fill="#eef5fb" text-anchor="middle" letter-spacing="0">Meta Quest 3</text><circle cx="466" cy="357" r="3.5" fill="#38bdf8"/><text x="482" y="362" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">2064×2208/eye · pancake</text><circle cx="466" cy="394.76" r="3.5" fill="#38bdf8"/><text x="482" y="399.76" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">wider FOV · ~515g</text><circle cx="466" cy="432.52" r="3.5" fill="#38bdf8"/><text x="482" y="437.52" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">$599.99</text><circle cx="466" cy="470.28" r="3.5" fill="#38bdf8"/><text x="482" y="475.28" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Standalone + PCVR</text><circle cx="466" cy="508.03999999999996" r="3.5" fill="#38bdf8"/><text x="482" y="513.04" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Needs RTX 5070-class</text><rect x="812" y="200" width="346" height="616" rx="14" ry="14" fill="#1c2b3a" stroke="#38bdf8" stroke-width="2.5" opacity="1"/><path d="M812 216 q0 -16 16 -16 h314 q16 0 16 16 v54 h-346 z" fill="#38bdf8"/><text x="985" y="246" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="18" font-weight="800" fill="#0b1118" text-anchor="middle" letter-spacing="2">CLARITY</text><text x="985" y="308" font-family="'Helvetica Neue',Arial,sans-serif" font-size="21" font-weight="800" fill="#eef5fb" text-anchor="middle" letter-spacing="0">Pimax Crystal Super</text><circle cx="836" cy="357" r="3.5" fill="#38bdf8"/><text x="852" y="362" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">3840×3840/eye (~50 PPD)</text><circle cx="836" cy="394.76" r="3.5" fill="#38bdf8"/><text x="852" y="399.76" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">tethered, heavier</text><circle cx="836" cy="432.52" r="3.5" fill="#38bdf8"/><text x="852" y="437.52" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">~$1,783</text><circle cx="836" cy="470.28" r="3.5" fill="#38bdf8"/><text x="852" y="475.28" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">PCVR · inside-out tracking</text><circle cx="836" cy="508.03999999999996" r="3.5" fill="#38bdf8"/><text x="852" y="513.04" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Needs RTX 5090</text><rect x="1182" y="200" width="346" height="616" rx="14" ry="14" fill="#16222e" stroke="#2b3e51" stroke-width="1" opacity="1"/><path d="M1182 216 q0 -16 16 -16 h314 q16 0 16 16 v54 h-346 z" fill="#0b1118"/><text x="1355" y="246" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="18" font-weight="800" fill="#38bdf8" text-anchor="middle" letter-spacing="2">COMFORT</text><text x="1355" y="308" font-family="'Helvetica Neue',Arial,sans-serif" font-size="21" font-weight="800" fill="#eef5fb" text-anchor="middle" letter-spacing="0">Bigscreen Beyond 2</text><circle cx="1206" cy="357" r="3.5" fill="#38bdf8"/><text x="1222" y="362" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">2560×2560 micro-OLED, true</text><text x="1222" y="383.76" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">blacks</text><circle cx="1206" cy="416.52" r="3.5" fill="#38bdf8"/><text x="1222" y="421.52" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">107g — lightest PCVR made</text><circle cx="1206" cy="454.28" r="3.5" fill="#38bdf8"/><text x="1222" y="459.28" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">$1,019 ($1,219 for 2e)</text><circle cx="1206" cy="492.03999999999996" r="3.5" fill="#38bdf8"/><text x="1222" y="497.03999999999996" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">PCVR · needs SteamVR base</text><text x="1222" y="518.8" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">stations</text><circle cx="1206" cy="551.56" r="3.5" fill="#38bdf8"/><text x="1222" y="556.56" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Needs RTX 5080</text><rect x="72" y="836" width="1456" height="71.52000000000001" rx="14" ry="14" fill="#0b1118" stroke="#38bdf8" stroke-width="1.5" opacity="1"/><rect x="72" y="836" width="8" height="71.52000000000001" fill="#38bdf8"/><text x="102" y="870" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">The headset is only half the purchase — every tier assumes a GPU that can feed it. Standalone = Quest only; everything else is tethered PCVR.</text><text x="102" y="893.04" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Beyond 2 also needs base stations + controllers (extra cost).</text>
