<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0b1118"/><stop offset="1" stop-color="#0f1a25"/></linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.08" r="0.75"><stop offset="0" stop-color="#f59e0b" stop-opacity="0.16"/><stop offset="1" stop-color="#f59e0b" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M44 0H0V44" fill="none" stroke="#25384a" stroke-width="1" opacity="0.3"/></pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <rect x="72" y="60" width="14" height="14" fill="#f59e0b"/>
   <text x="100" y="73" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="18" font-weight="700" fill="#f59e0b" text-anchor="start" letter-spacing="4">PICK THE SEAT BY WHAT YOU VALUE</text>
   <text x="72" y="128" font-family="'Helvetica Neue',Arial,sans-serif" font-size="44" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="-0.5">GT Bucket vs Fabric Seat</text>
   <rect x="72" y="146" width="150" height="5" rx="2.5" fill="#f59e0b"/>
  <rect x="336" y="192" width="589" height="82" rx="14" ry="14" fill="#1c2b3a" stroke="#f59e0b" stroke-width="1.5" opacity="1"/><text x="630.5" y="226" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="800" fill="#eef5fb" text-anchor="middle" letter-spacing="0">GT bucket (fibreglass)</text><text x="630.5" y="254" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="600" fill="#f59e0b" text-anchor="middle" letter-spacing="1">authenticity · tactile</text><rect x="939" y="192" width="589" height="82" rx="14" ry="14" fill="#1c2b3a" stroke="#f59e0b" stroke-width="1.5" opacity="1"/><text x="1233.5" y="226" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="800" fill="#eef5fb" text-anchor="middle" letter-spacing="0">Fabric / padded seat</text><text x="1233.5" y="254" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="600" fill="#f59e0b" text-anchor="middle" letter-spacing="1">comfort · budget</text><rect x="72" y="288" width="250" height="58" rx="14" ry="14" fill="#16222e" stroke="none" stroke-width="1" opacity="1"/><text x="90" y="323" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">Support</text><rect x="336" y="288" width="589" height="58" rx="14" ry="14" fill="#16222e" stroke="#f59e0b" stroke-width="2" opacity="1"/><text x="356" y="316" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">High — side bolsters lock the body in place</text><text x="911" y="318" font-family="'Helvetica Neue',Arial,sans-serif" font-size="19" font-weight="800" fill="#f59e0b" text-anchor="end" letter-spacing="0">✓</text><rect x="939" y="288" width="589" height="58" rx="14" ry="14" fill="#16222e" stroke="none" stroke-width="0" opacity="1"/><text x="959" y="316" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">Moderate — padded, with more give</text><rect x="72" y="354" width="250" height="58" rx="14" ry="14" fill="#0f1822" stroke="none" stroke-width="1" opacity="1"/><text x="90" y="389" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">Comfort (2h+)</text><rect x="336" y="354" width="589" height="58" rx="14" ry="14" fill="#0f1822" stroke="none" stroke-width="0" opacity="1"/><text x="356" y="382" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">Firmer, less forgiving over long stints</text><rect x="939" y="354" width="589" height="58" rx="14" ry="14" fill="#0f1822" stroke="#f59e0b" stroke-width="2" opacity="1"/><text x="959" y="382" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">High — cushioned, better for endurance</text><text x="1514" y="384" font-family="'Helvetica Neue',Arial,sans-serif" font-size="19" font-weight="800" fill="#f59e0b" text-anchor="end" letter-spacing="0">✓</text><rect x="72" y="420" width="250" height="58" rx="14" ry="14" fill="#16222e" stroke="none" stroke-width="1" opacity="1"/><text x="90" y="455" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">Tactile transfer</text><rect x="336" y="420" width="589" height="58" rx="14" ry="14" fill="#16222e" stroke="#f59e0b" stroke-width="2" opacity="1"/><text x="356" y="448" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">High — the rigid shell transmits weight transfer &amp; vibration</text><text x="911" y="450" font-family="'Helvetica Neue',Arial,sans-serif" font-size="19" font-weight="800" fill="#f59e0b" text-anchor="end" letter-spacing="0">✓</text><rect x="939" y="420" width="589" height="58" rx="14" ry="14" fill="#16222e" stroke="none" stroke-width="0" opacity="1"/><text x="959" y="448" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">Lower — padding absorbs feel</text><rect x="72" y="486" width="250" height="58" rx="14" ry="14" fill="#0f1822" stroke="none" stroke-width="1" opacity="1"/><text x="90" y="521" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="800" fill="#eef5fb" text-anchor="start" letter-spacing="0">Price</text><rect x="336" y="486" width="589" height="58" rx="14" ry="14" fill="#0f1822" stroke="none" stroke-width="0" opacity="1"/><text x="356" y="514" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#8fa4b6" text-anchor="start" letter-spacing="0">Higher — shell + side-mount brackets required</text><rect x="939" y="486" width="589" height="58" rx="14" ry="14" fill="#0f1822" stroke="#f59e0b" stroke-width="2" opacity="1"/><text x="959" y="514" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">Lower — NLR Elite ES1 ~$449, or built into GTLite / GT Track</text><text x="1514" y="516" font-family="'Helvetica Neue',Arial,sans-serif" font-size="19" font-weight="800" fill="#f59e0b" text-anchor="end" letter-spacing="0">✓</text><rect x="72" y="554" width="1456" height="70.88" rx="14" ry="14" fill="#101b12" stroke="#34d399" stroke-width="1" opacity="1"/><text x="94" y="586" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="14" font-weight="800" fill="#34d399" text-anchor="start" letter-spacing="2">RULE</text><text x="192" y="582" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">A bucket needs side-mount brackets + a rigid frame with seat rails — it won't mount on a folding stand. Buy fabric for comfort+budget; a bucket</text><text x="192" y="603.76" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#eef5fb" text-anchor="start" letter-spacing="0">for tactile+race-car feel.</text>
  <line x1="72" y1="914" x2="1528" y2="914" stroke="#2b3e51" stroke-width="1" opacity="0.6"/>
   <text x="72" y="960" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="16" font-weight="700" fill="#8fa4b6" text-anchor="start" letter-spacing="3">IGNITIONSIM.COM</text>
   <rect x="1418" y="938" width="110" height="34" rx="17" fill="#f59e0b" opacity="0.16"/>
   <text x="1473" y="960" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" font-weight="700" fill="#f59e0b" text-anchor="middle" letter-spacing="2">RACING</text>
