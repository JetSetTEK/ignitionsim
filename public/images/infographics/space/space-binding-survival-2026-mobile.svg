    <text x="78" y="148" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="900" fill="#fff">A control map is only good if</text><text x="78" y="192.1" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="900" fill="#fff">you can recover it.</text>
