      <text x="66" y="588" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="900" fill="#07131b">HAUL / EXPLORE</text>
      <circle cx="326" cy="577" r="5" fill="#d946ef"/><text x="344" y="585" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#1d2a34">HOTAS is comfortable</text><circle cx="326" cy="619" r="5" fill="#d946ef"/><text x="344" y="627" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#1d2a34">Throttle owns cruise</text><circle cx="326" cy="661" r="5" fill="#d946ef"/><text x="344" y="669" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#1d2a34">Add ministick strafe</text>
