    <text x="78" y="148" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="900" fill="#fff">HOSAS for translation. HOTAS</text><text x="78" y="192.1" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="900" fill="#fff">for thrust habit.</text>
