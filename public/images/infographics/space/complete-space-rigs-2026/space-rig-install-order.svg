<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Space simulator rig installation order</title>
  <desc id="desc">An installation sequence covering seat geometry, mounts, controls, USB power, drivers, bindings, and recovery files.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="1" x2="1" y2="0">
      <stop stop-color="#112536"/>
      <stop offset="1" stop-color="#17213b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ff6a3d"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="70" y="86" fill="#31d2c0" font-family="Arial, sans-serif" font-size="23" font-weight="800">VAL CHEN'S WEEKEND-SAVER</text>
  <text x="70" y="145" fill="#fff" font-family="Arial, sans-serif" font-size="50" font-weight="900">Install in this order or troubleshoot twice.</text>
  <text x="70" y="190" fill="#b9c9d7" font-family="Arial, sans-serif" font-size="24">The control profile is the last layer, not the foundation.</text>
  <path d="M190 470 H1410" stroke="#ff6a3d" stroke-width="12" marker-end="url(#arrow)"/>
  <g font-family="Arial, sans-serif">
    <g transform="translate(95 300)">
      <circle cx="95" cy="170" r="92" fill="#ff6a3d"/>
      <text x="95" y="185" text-anchor="middle" fill="#fff" font-size="52" font-weight="900">1</text>
      <text x="95" y="315" text-anchor="middle" fill="#fff" font-size="26" font-weight="900">SEAT + REACH</text>
      <text x="95" y="354" text-anchor="middle" fill="#b9c9d7" font-size="20">Elbows relaxed</text>
      <text x="95" y="382" text-anchor="middle" fill="#b9c9d7" font-size="20">Mouse reachable</text>
    </g>
    <g transform="translate(355 300)">
      <circle cx="95" cy="170" r="92" fill="#e8a33f"/>
      <text x="95" y="185" text-anchor="middle" fill="#101820" font-size="52" font-weight="900">2</text>
      <text x="95" y="315" text-anchor="middle" fill="#fff" font-size="26" font-weight="900">MOUNTS</text>
      <text x="95" y="354" text-anchor="middle" fill="#b9c9d7" font-size="20">No desk slide</text>
      <text x="95" y="382" text-anchor="middle" fill="#b9c9d7" font-size="20">No wrist bend</text>
    </g>
    <g transform="translate(615 300)">
      <circle cx="95" cy="170" r="92" fill="#31d2c0"/>
      <text x="95" y="185" text-anchor="middle" fill="#102632" font-size="52" font-weight="900">3</text>
      <text x="95" y="315" text-anchor="middle" fill="#fff" font-size="26" font-weight="900">USB POWER</text>
      <text x="95" y="354" text-anchor="middle" fill="#b9c9d7" font-size="20">Powered hub</text>
      <text x="95" y="382" text-anchor="middle" fill="#b9c9d7" font-size="20">Label every port</text>
    </g>
    <g transform="translate(875 300)">
      <circle cx="95" cy="170" r="92" fill="#51a8ef"/>
      <text x="95" y="185" text-anchor="middle" fill="#fff" font-size="52" font-weight="900">4</text>
      <text x="95" y="315" text-anchor="middle" fill="#fff" font-size="26" font-weight="900">DRIVERS</text>
      <text x="95" y="354" text-anchor="middle" fill="#b9c9d7" font-size="20">Firmware first</text>
      <text x="95" y="382" text-anchor="middle" fill="#b9c9d7" font-size="20">Test every axis</text>
    </g>
    <g transform="translate(1135 300)">
      <circle cx="95" cy="170" r="92" fill="#8c62db"/>
      <text x="95" y="185" text-anchor="middle" fill="#fff" font-size="52" font-weight="900">5</text>
      <text x="95" y="315" text-anchor="middle" fill="#fff" font-size="26" font-weight="900">BIND + FLY</text>
      <text x="95" y="354" text-anchor="middle" fill="#b9c9d7" font-size="20">One layer at a time</text>
      <text x="95" y="382" text-anchor="middle" fill="#b9c9d7" font-size="20">Export recovery copy</text>
    </g>
  </g>
  <rect x="98" y="760" width="1404" height="72" rx="18" fill="#fff" opacity=".09"/>
  <text x="800" y="806" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="23" font-weight="800">First flight = calibration lap. Add pedals, trackers, and macro decks only after the primary axes feel boringly reliable.</text>
</svg>
