<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1500" role="img" aria-labelledby="title desc">
  <title id="title">Five space simulator control map for mobile</title>
  <desc id="desc">Mobile decision map for choosing controls for five popular space simulators.</desc>
  <rect width="900" height="1500" fill="#0b1825"/>
  <text x="56" y="72" fill="#ff7347" font-family="Arial, sans-serif" font-size="24" font-weight="800">IGNITIONSIM // FIVE HONEST RIGS</text>
  <text x="56" y="130" fill="#fff" font-family="Arial, sans-serif" font-size="46" font-weight="900">Buy for the game.</text>
  <text x="56" y="178" fill="#b8c8d6" font-family="Arial, sans-serif" font-size="25">Not every spaceship wants dual sticks.</text>
  <g font-family="Arial, sans-serif">
    <rect x="50" y="230" width="800" height="205" rx="20" fill="#f8fbff"/>
    <text x="82" y="280" fill="#087da9" font-size="20" font-weight="800">STAR CITIZEN</text>
    <text x="82" y="332" fill="#101820" font-size="34" font-weight="900">Dual-stick HOSAS</text>
    <text x="82" y="377" fill="#425468" font-size="24">Six analog axes · tracker · labeled binds</text>
    <text x="760" y="333" text-anchor="end" fill="#087da9" font-size="24" font-weight="900">BUY</text>

    <rect x="50" y="455" width="800" height="205" rx="20" fill="#fff8ef"/>
    <text x="82" y="505" fill="#d25c22" font-size="20" font-weight="800">ELITE DANGEROUS</text>
    <text x="82" y="557" fill="#101820" font-size="34" font-weight="900">Comfortable HOTAS</text>
    <text x="82" y="602" fill="#5f4a3a" font-size="24">Head tracker · mounts · long-session reach</text>
    <text x="760" y="558" text-anchor="end" fill="#d25c22" font-size="24" font-weight="900">BUY</text>

    <rect x="50" y="680" width="800" height="205" rx="20" fill="#edfff9"/>
    <text x="82" y="730" fill="#16856d" font-size="20" font-weight="800">X4: FOUNDATIONS</text>
    <text x="82" y="782" fill="#101820" font-size="34" font-weight="900">HOTAS + mouse</text>
    <text x="82" y="827" fill="#365d54" font-size="24">Fly on controls · run the empire on mouse</text>
    <text x="760" y="783" text-anchor="end" fill="#16856d" font-size="24" font-weight="900">HYBRID</text>

    <rect x="50" y="905" width="800" height="205" rx="20" fill="#fff2f0"/>
    <text x="82" y="955" fill="#c34245" font-size="20" font-weight="800">EVERSPACE 2</text>
    <text x="82" y="1007" fill="#101820" font-size="34" font-weight="900">Controller first</text>
    <text x="82" y="1052" fill="#684344" font-size="24">HOTAS works, but demo-test compatibility</text>
    <text x="760" y="1008" text-anchor="end" fill="#c34245" font-size="24" font-weight="900">SAVE</text>

    <rect x="50" y="1130" width="800" height="205" rx="20" fill="#f7f1ff"/>
    <text x="82" y="1180" fill="#7746b7" font-size="20" font-weight="800">NO MAN'S SKY</text>
    <text x="82" y="1232" fill="#101820" font-size="34" font-weight="900">Controller / VR</text>
    <text x="82" y="1277" fill="#5e4b75" font-size="24">No native HOTAS · workaround only</text>
    <text x="760" y="1233" text-anchor="end" fill="#7746b7" font-size="24" font-weight="900">SKIP STICKS</text>
  </g>
  <rect x="50" y="1370" width="800" height="82" rx="18" fill="#162c3e"/>
  <text x="450" y="1420" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="23" font-weight="800">Mount. Power. Label. Export the profile.</text>
</svg>
