<rect x="70" y="302" width="1180" height="110" rx="26" fill="#ffffff" opacity="0.93"/>
<text x="110" y="356" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="#0b1118">Buy HOTAS</text>
<text x="110" y="398" font-family="Arial, sans-serif" font-size="22" fill="#425466">If hauling, mixed flight sims, and throttle feel matter more.</text>
<text x="1120" y="378" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#b45cff" text-anchor="middle">Yes</text>
