<text x="110" y="488" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="#0b1118">Wait</text>
<text x="110" y="530" font-family="Arial, sans-serif" font-size="22" fill="#425466">If alpha bugs make you rage or your desk cannot mount the gear.</text>
<text x="1120" y="510" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#b45cff" text-anchor="middle">Wait</text>
